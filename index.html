<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard RKB 2025/2026 · Reformasi Kerenah Birokrasi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<!-- Pustaka luaran (dimuat dari CDN; berfungsi apabila fail dibuka dalam pelayar) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
:root{
  /* Tema RKB — hitam korporat + merah logo */
  --navy:#1A1A1A; --navy-d:#0D0D0D; --royal:#CC0000; --gold:#CC0000; --gold-d:#AA0000;
  --bg:#F2F2F2; --panel:#FFFFFF; --ink:#1A1A1A; --ink-soft:#5C5C5C; --line:#E0E0E0;
  --ok:#1F8A4C; --warn:#C9821A; --bad:#CC0000; --info:#1A6FB3;
  --c-sc:#1F8A4C; --c-c:#4FA06B; --c-b:#C9A227; --c-m:#D4843C; --c-p:#CC0000;
  --shadow:0 1px 2px rgba(0,0,0,.06),0 10px 28px rgba(0,0,0,.08);
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--ink);background:var(--bg);font-size:14.5px;line-height:1.45}
body.processing,body.processing *{cursor:progress !important}
button{font-family:inherit;cursor:pointer}
.hidden{display:none !important}
.mono{font-family:'IBM Plex Mono',monospace}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(150deg,#1A1A1A 0%,#2C0000 60%,#1A1A1A 100%);padding:20px}
#login:before{content:"";position:absolute;inset:0;opacity:.07;background-image:repeating-linear-gradient(45deg,#fff 0 1px,transparent 1px 16px)}
.logincard{position:relative;background:var(--panel);border-radius:20px;box-shadow:0 30px 80px rgba(0,0,0,.4);
  width:100%;max-width:410px;padding:38px 34px;animation:rise .5s ease}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.loginbrand{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:24px}
.loginbrand .sub{font-size:.78rem;color:var(--ink-soft);margin-top:10px;letter-spacing:.02em}
.loginbrand h2{font-weight:800;font-size:1.5rem;color:var(--navy);margin-top:14px;letter-spacing:-.01em}
.field{margin-bottom:15px}
.field label{display:block;font-size:.8rem;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
.field input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;font-size:.95rem;outline:none;transition:.15s;background:#FBFCFE}
.field input:focus{border-color:var(--royal);box-shadow:0 0 0 4px rgba(204,0,0,.12)}
.loginbtn{width:100%;background:linear-gradient(135deg,#CC0000,#990000);color:#fff;border:none;border-radius:11px;
  padding:13px;font-weight:700;font-size:1rem;margin-top:8px;box-shadow:0 8px 20px rgba(204,0,0,.3);transition:.15s}
.loginbtn:hover{filter:brightness(1.08)}
.loginbtn:active{transform:translateY(1px)}
.loginerr{background:#FDECEA;border:1px solid #F1B0A8;color:#A5281B;font-size:.82rem;padding:9px 12px;border-radius:9px;margin-bottom:14px}
.demohint{margin-top:18px;border-top:1px dashed var(--line);padding-top:14px;font-size:.74rem;color:var(--ink-soft)}
.demohint b{color:var(--ink)}
.demohint code{background:#EEF2F7;padding:1px 6px;border-radius:5px;font-family:'IBM Plex Mono'}

/* ---------- APP SHELL ---------- */
#app{display:flex;min-height:100vh}
.sidebar{width:248px;background:linear-gradient(180deg,var(--navy),var(--navy-d));color:#D6E0EE;display:flex;flex-direction:column;
  position:fixed;top:0;bottom:0;left:0;z-index:40;transition:transform .25s ease}
.sb-brand{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:11px}
.sb-brand .t{font-weight:800;font-size:1.02rem;color:#fff;line-height:1.1}
.sb-brand .t small{display:block;font-weight:500;font-size:.66rem;color:#9DB4D4;letter-spacing:.08em;margin-top:3px}
.sb-nav{flex:1;overflow-y:auto;padding:12px 10px}
.sb-nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:#C2D2E8;text-decoration:none;
  font-size:.86rem;font-weight:500;margin-bottom:3px;transition:.13s;border:1px solid transparent}
.sb-nav a:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-nav a.active{background:linear-gradient(135deg,#CC0000,rgba(153,0,0,.7));color:#fff;border-color:rgba(255,100,100,.3);box-shadow:inset 3px 0 0 #FF4444}
.sb-nav a svg{width:18px;height:18px;flex:none;opacity:.9}
.sb-foot{padding:14px;border-top:1px solid rgba(255,255,255,.1);font-size:.72rem;color:#8FA6C7}
.main{flex:1;margin-left:248px;display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
  padding:13px 22px;display:flex;align-items:center;gap:14px}
.topbar .ham{display:none;background:none;border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-size:1.1rem;color:var(--navy)}
.topbar h1{font-size:1.12rem;font-weight:800;color:var(--navy);letter-spacing:-.01em}
.topbar .who{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:.84rem}
.topbar .who .role{background:#CC0000;color:#fff;font-weight:700;font-size:.68rem;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.saveind{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:600;color:var(--ink-soft);background:#EEF3FA;border:1px solid var(--line);border-radius:20px;padding:4px 11px;font-family:'IBM Plex Mono'}
.saveind .d{width:8px;height:8px;border-radius:50%;background:var(--ok)}
.saveind.flash{animation:saveflash .8s ease}
@keyframes saveflash{0%{background:#CFEFD9;border-color:#8FD3A6}100%{background:#EEF3FA;border-color:var(--line)}}
.logout{background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 13px;font-weight:600;font-size:.82rem;color:var(--bad)}
.logout:hover{background:#FDECEA;border-color:#F1B0A8}
.content{padding:22px;max-width:1500px;width:100%}
.pagehead{margin-bottom:18px}
.pagehead h2{font-size:1.3rem;font-weight:800;color:var(--navy)}
.pagehead p{color:var(--ink-soft);font-size:.86rem;margin-top:3px}

/* cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--royal)}
.stat.g:before{background:var(--gold)}.stat.ok:before{background:var(--ok)}.stat.bad:before{background:var(--bad)}.stat.info:before{background:var(--info)}
.stat .lab{font-size:.73rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600}
.stat .val{font-size:1.75rem;font-weight:800;margin-top:5px;color:var(--navy);letter-spacing:-.02em}
.stat .sub{font-size:.72rem;color:var(--ink-soft);margin-top:2px}
.chartgrid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:18px}
.chartgrid .full{grid-column:1/-1}
.panelbox{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.panelbox h3{font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.chartwrap{position:relative;height:300px}
.chartwrap.sm{height:240px}

/* toolbar */
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
.inp,.sel{border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;font-size:.86rem;outline:none;background:#fff;color:var(--ink)}
.inp:focus,.sel:focus{border-color:var(--royal)}
.search{position:relative}.search input{padding-left:32px;min-width:210px}
.search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-soft)}
.btn{background:var(--royal);color:#fff;border:none;border-radius:10px;padding:9px 15px;font-weight:600;font-size:.84rem;box-shadow:var(--shadow);transition:.13s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:var(--navy)} .btn:disabled{opacity:.5;cursor:not-allowed}
.btn.g{background:var(--gold);color:#3a2b00}.btn.g:hover{background:var(--gold-d)}
.btn.ghost{background:#fff;color:var(--royal);border:1px solid var(--line)}.btn.ghost:hover{background:#F4F7FB}
.btn.ok{background:var(--ok)}.btn.bad{background:var(--bad)}
.btn.sm{padding:6px 11px;font-size:.78rem}
.spacer{flex:1}
/* segmented y-filter */
.segy{display:inline-flex;border:1.5px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
.segy button{border:none;background:none;padding:8px 13px;font-size:.8rem;font-weight:600;color:var(--ink-soft);border-right:1px solid var(--line)}
.segy button:last-child{border-right:none}
.segy button.on{background:var(--royal);color:#fff}
.segy button.on[data-y="Bertanda Y"]{background:var(--ok)}
.savepill{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:.74rem;color:var(--ok);
  background:#ECF8F1;border:1px solid #BBE3C8;border-radius:10px;padding:8px 12px;white-space:nowrap;transition:.2s}
.savepill.flash{background:#D6F0E0;box-shadow:0 0 0 3px rgba(31,138,76,.18)}

/* table */
.tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:auto}
table.dt{border-collapse:collapse;width:100%;min-width:760px}
table.dt thead th{position:sticky;top:0;z-index:2;background:var(--navy);color:#E7EEF7;font-size:.72rem;text-transform:uppercase;letter-spacing:.03em;
  font-weight:600;text-align:left;padding:11px 10px;white-space:nowrap;cursor:pointer;user-select:none}
table.dt thead th.c{text-align:center}
table.dt tbody td{padding:9px 10px;border-bottom:1px solid #EDF1F6;font-size:.84rem;vertical-align:middle}
table.dt tbody tr:hover{background:#F5F8FC}
.rank{font-weight:800;color:var(--navy);text-align:center;font-family:'IBM Plex Mono'}
.kpill{font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:20px;color:#fff;white-space:nowrap;display:inline-block}
.rm{font-family:'IBM Plex Mono';font-size:.8rem;white-space:nowrap;text-align:right}
.kin{width:46px;text-align:center;font-family:'IBM Plex Mono';font-weight:600;border:1px solid var(--line);border-radius:7px;padding:5px 2px;background:#fff;color:#1140A8}
.kin:focus{outline:2px solid var(--gold)}
.markah{font-family:'IBM Plex Mono';font-weight:700;text-align:center}
.ent{font-weight:600;max-width:200px}
.tajuk{max-width:340px;line-height:1.3}
.muted{color:var(--ink-soft);font-size:.78rem}
.empty{padding:46px;text-align:center;color:var(--ink-soft);font-style:italic}
.eyebtn{background:#EEF3FA;border:1px solid #CFE0F2;color:var(--royal);border-radius:8px;padding:5px 10px;font-size:.76rem;font-weight:600;white-space:nowrap}
.eyebtn:hover{background:var(--royal);color:#fff}
.segtabs{display:flex;gap:6px;flex-wrap:wrap}
.segtabs .seg{background:#F0F0F0;border:2px solid #E0E0E0;color:#666;border-radius:8px;padding:7px 16px;font-size:.82rem;font-weight:700;cursor:pointer;transition:.15s}
.segtabs .seg:hover{border-color:#CC0000;color:#CC0000}
.segtabs .seg.active{background:#CC0000;border-color:#CC0000;color:#fff}
.decsel{border:1.5px solid var(--line);border-radius:8px;padding:6px 8px;font-size:.8rem;background:#fff}
.decsel:disabled{background:#F1F3F6;color:#9aa3af;cursor:not-allowed}
.tag-done{color:var(--ok);font-weight:700;font-size:.78rem}
.tag-wait{color:var(--warn);font-weight:600;font-size:.78rem}

/* upload zones */
.drop{border:2px dashed var(--line);border-radius:var(--radius);padding:26px;text-align:center;color:var(--ink-soft);background:#FBFCFE;transition:.15s}
.drop.drag{border-color:var(--royal);background:#F0F5FC}
.upgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.filechip{font-size:.8rem;color:var(--navy);font-weight:600;margin-top:8px}

/* modal */
.modal{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;background:rgba(8,20,40,.55);padding:18px;backdrop-filter:blur(3px)}
.modal.show{display:flex;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modalcard{background:#fff;border-radius:18px;max-width:760px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.modalhead{position:sticky;top:0;background:linear-gradient(135deg,var(--navy),var(--royal));color:#fff;padding:18px 22px;display:flex;align-items:flex-start;gap:12px}
.modalhead .rk{background:var(--gold);color:#3a2b00;font-weight:800;border-radius:10px;padding:6px 12px;font-family:'IBM Plex Mono';font-size:1rem;flex:none}
.modalhead h3{font-size:1.05rem;font-weight:700;line-height:1.25}
.modalhead .x{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:9px;font-size:1.2rem;flex:none}
.modalhead .x:hover{background:rgba(255,255,255,.28)}
.modalbody{padding:20px 22px}
.frow{margin-bottom:15px}
.frow .k{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gold-d);font-weight:700;margin-bottom:3px}
.frow .v{font-size:.9rem;color:var(--ink);white-space:pre-wrap;line-height:1.5}
.kvgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px 22px}
.scorechips{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.sc{font-family:'IBM Plex Mono';font-size:.74rem;background:#EEF3FA;border:1px solid #D4E2F2;border-radius:7px;padding:3px 8px;color:var(--navy)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(90px);z-index:120;color:#fff;padding:12px 22px;border-radius:12px;
  box-shadow:0 12px 34px rgba(0,0,0,.3);font-size:.88rem;font-weight:600;opacity:0;transition:.3s;background:var(--navy)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{background:var(--ok)}.toast.bad{background:var(--bad)}.toast.warn{background:var(--warn)}
.spin{width:15px;height:15px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
.note{font-size:.82rem;background:#FFF7E6;border:1px solid #F0D58C;color:#8A5A00;border-radius:11px;padding:11px 14px;margin-bottom:14px}

/* responsive */
@media(max-width:960px){
  .sidebar{transform:translateX(-100%);box-shadow:0 0 40px rgba(0,0,0,.4)}
  .sidebar.open{transform:none}
  .main{margin-left:0}
  .topbar .ham{display:block}
  .chartgrid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .content{padding:14px}
  .topbar h1{font-size:1rem}
  .who .uname{display:none}
  .upgrid{grid-template-columns:1fr}
  .kvgrid{grid-template-columns:1fr}
}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:39;display:none}
.backdrop.show{display:block}
@media(min-width:961px){.backdrop{display:none !important}}
</style>
  <!-- Supabase Cloud Sync -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<!-- ================= LOGIN ================= -->
<div id="login">
  <form class="logincard" id="loginForm" autocomplete="off">
    <div class="loginbrand" id="loginBrand"></div>
    <div class="loginerr hidden" id="loginErr"></div>
    <div class="field"><label>Nama Pengguna</label><input id="luser" type="text" autocomplete="off" placeholder="Masukkan username"></div>
    <div class="field"><label>Kata Laluan</label><input id="lpass" type="password" autocomplete="new-password" placeholder="Masukkan password"></div>
    <button class="loginbtn" type="submit">Log Masuk</button>
    <div class="demohint" id="demohint"></div>
  </form>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hidden">
  <div class="backdrop" id="backdrop"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand" id="sbBrand"></div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-foot">RKB 2025/2026 · Pejabat RKB<br><span id="sbVer"></span></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="ham" id="ham">☰</button>
      <h1 id="pageTitle">Dashboard Utama</h1>
      <div class="who">
        <span class="saveind" id="saveInd"><span class="d"></span> Auto-simpan</span>
        <span class="uname mono" id="whoName"></span>
        <span class="role" id="whoRole"></span>
        <button class="logout" id="logoutBtn">Log Keluar</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- modal + toast -->
<div class="modal" id="modal"><div class="modalcard" id="modalCard"></div></div>
<div class="toast" id="toast"></div>

 veteran berdaftar.\n- Pada tahun 2025, sebanyak 21,108 permohonan Kad Veteran ATM diterima.\n- Sebanyak 14,721 permohonan atau 29,442 kad telah diselesaikan dalam tempoh 1 hari.\n- Dianggarkan sekurang-kurangnya 14,000 pemohon mendapat manfaat setiap tahun melalui proses yang lebih cepat, mudah dan mesra pelanggan.\n\nManfaat projek bersifat nasional kerana komuniti veteran ATM berada di seluruh negara dan merupakan kumpulan strategik yang telah menyumbang kepada keselamatan serta kedaulatan negara.","keterangan":"JHEV ATM mengurus pengeluaran Kad Veteran ATM bagi membolehkan veteran berpencen, veteran tidak berpencen serta balu/duda veteran mengakses kemudahan dan bantuan kebajikan. Sebelum pelaksanaan RKB, proses pengeluaran kad mengambil masa 3 hari atau lebih kerana masih bergantung kepada dokumen fizikal, semakan manual, kemas kini dalam VIBES 2.0, pengesahan, kelulusan dan cetakan kad. Proses manual ini menyebabkan kelewatan, keperluan menunggu lebih lama, risiko keciciran permohonan dan menjejaskan pengalaman pelanggan serta keyakinan veteran terhadap jabatan.\n\nProjek ini merupakan inisiatif strategik Reformasi Kerenah Birokrasi yang menumpukan kepada pemudahan proses, reka bentuk semula aliran kerja dan pemendekan tempoh pengeluaran Kad Veteran ATM daripada 3 hari kepada 1hari (30 minit) bagi permohonan lengkap. Projek ini bukan sekadar penambahbaikan operasi dalaman, tetapi memberi kesan langsung kepada kesejahteraan veteran ATM kerana kad tersebut menjadi dokumen penting bagi pengesahan status serta akses kepada kemudahan dan manfaat berkaitan veteran.\n\nInisiatif ini selari dengan agenda reformasi perkhidmatan awam dan aspirasi Malaysia MADANI melalui penyampaian perkhidmatan yang cekap, ihsan, responsif dan berorientasikan rakyat. Projek ini juga membuktikan bahawa penambahbaikan proses berasaskan data dan reka bentuk semula aliran kerja mampu meningkatkan produktiviti sektor awam tanpa pertambahan sumber manusia yang ketara. Proses baharu pengeluaran Kad Veteran ATM dalam tempoh  dicadangkan untuk diinstitusikan sebagai SOP baharu.","impak":"Impak produktiviti dan kos:\n- Tempoh pengeluaran Kad Veteran ATM dikurangkan daripada 3 hari kepada 1hari (30 minit).\n- Pengurangan masa pemprosesan sebanyak 97.92%.\n- Masa kerja aktif jabatan berkurang daripada 5 jam kepada 0.5 jam setiap permohonan.\n- Pengurangan kos pematuhan keseluruhan sebanyak 86.38%.\n- Penjimatan kos pematuhan sebanyak RM4.014 juta setahun.\n- Kos pemohon berkurang daripada RM232.50 kepada RM35.25 setiap permohonan.\n- Dianggarkan 14,000 pemohon mendapat manfaat setiap tahun.\n\nImpak strategik kepada rakyat dan perkhidmatan awam:\n- Mempercepat akses veteran ATM, pasangan dan waris kepada pengesahan status serta manfaat kebajikan berkaitan veteran.\n- Mengurangkan keperluan hadir berulang kali, masa menunggu, kos perjalanan dan beban urusan pelanggan.\n- Meningkatkan pengalaman pelanggan, imej JHEV ATM dan keyakinan veteran terhadap penyampaian perkhidmatan kerajaan.\n- Menyokong agenda Reformasi Kerenah Birokrasi, Malaysia MADANI dan reformasi perkhidmatan awam melalui perkhidmatan yang lebih cepat, mudah, cekap dan berorientasikan rakyat.\n","pengiraan":"Penjimatan: RM4.014 juta setahun\n\nKos sebelum: RM4.647 juta setahun\n\nKos selepas: RM632,704.55 setahun\n\nPenjimatan diperoleh melalui pengurangan kos JHEV ATM sebanyak RM1.253 juta dan kos pemohon/veteran sebanyak RM2.762 juta, hasil pengurangan tempoh proses daripada 3 hari kepada 1 hari (30 minit)","rm":4014000.0,"ahli":"Lt. Kol. Salim bin Ibrahim\nMej. Sariza binti Ab Rahman\nPW I Buhati binti Mapiase\nSiti Mahmudah binti Ismail","scores":{"K1":5,"K2":5,"K3":4,"K4":5,"K5":5,"K6":5,"K7":4},"nota":"","xrank":7},{"id":"Kementerian#5","bil":"5","kat":"Kementerian","cy":true,"entiti":"KEMENTERIAN PEMBANGUNAN WANITA, KELUARGA DAN MASYARAKAT (KPWKM)","agensi":"KEMENTERIAN PEMBANGUNAN WANITA, KELUARGA DAN MASYARAKAT (KPWKM)","tajuk":"Meningkatkan Kecekapan Pembayaran Bantuan Am Negeri Melalu kepada situasi yang sangat berisiko yang boleh menyebabkan penyakit dan kecederaan yang membawa kepada kemalangan dan kemalangan maut. Kebanyakan kemalangan maut melibatkan pekerja bekerja dalam ruang terkurung seperti bekerja di dalam silo, tangki simpanan,\nbekas tekanan atau tangki, sistem pembetung atau sistem komunikasi, parit dan lain-lain. Dalam kebanyakan kes, punca kematian adalah kerana terhidu toksik gas atau kekurangan oksigen\nBagi mengatasi masalah ini, JKKP telah membangunkan dan menguatkuasakan undang-undang berkaitan bekerja di ruang terkurung iaitu Tatamalan Industri Bekerja Selamat di Ruang Terkurung 2010\nBilangan prmohonan bagi  AGT dan ES menunjukkan peningkatan sebanyak 25% bagi perbandingan tahun 2022 (4,241) dan 2023 (5,651)\nMajikan mempunyai kewajipan untuk menjalankan penilaian tentang potensi risiko kesihatan yang wujud daripada penggunaan BKBKK di tempat kerja","impak":"Peningkatan kecekapan perkhidmatan awam (service delivery): Masa pemprosesan yang lebih cepat akan meningkatkan tahap responsif Jabatan terhadap permohonan industri\nPengukuhan imej JKKP sebagai agensi cekap dan berintegriti: Penurunan masa pemprosesan memberi isyarat kepada pemegang taruh bahawa JKKP menitikberatkan produktiviti dan akauntabiliti.\nPeningkatan Keupayaan Industri Memenuhi Keperluan Kompetensi KKP: Mengurangkan jurang permintaan–penawaran dalam sektor pembuatan, minyak & gas, logistik, pembinaan dan perkhidmatan.\nPengurangan Kos Kepada Pemohon dan Industri: Tempoh menunggu yang lebih pendek mengurangkan kos operasi syarikat.\nPengurangan Risiko Kemalangan, Pendedahan Kimia dan Insiden Ruang Terkurung\nMerangsang Ekonomi dan Produktiviti Sektor Industri: Mempercepat kelulusan kompeten → mempercepat projek dan operasi industri.","pengiraan":"Untuk permohonan baharu AGT dan ES, kos gaji bagi 5 orang pegawai proses selepas disingkatkan masa permohonan sebanyak RM145,500. Kos penjimatan sebanyak RM29,100. Peratus penjimatan sebanyak 17% dapat dijimatkan.\nBag bedah siasat dapat disiapkan dengan lebih cepat.\nSiasatan polis dan urusan perbicaraan mahkamah dapat disegerakan.\nTuntutan insurans waris dapat dipercepatkan.\nRisiko kehilangan, kerosakan dan kelewatan dokumen fizikal dapat dikurangkan.\nMeningkatkan imej serta keupayaan Jabatan Kimia Malaysia sebagai agensi forensik yang cekap dan responsif.\nMenyokong keadilan kepada keluarga mangsa, pembebasan pihak tidak bersalah dan hukuman setimpal kepada pesalah.\nMenyokong agenda pendigitalan kerajaan dan pengurangan penggunaan kertas.\nBoleh diperluas ke negeri yang mempunyai makmal","pengiraan":"Jumlah kos sebelum penambahbaikan: RM23.32Juta\nJumlah kos selepas penambahbaikan: RM900K\nJumlah penjimatan kos pematuhan: RM22.42 juta setahun\n\nPeratus pengurangan kos pematuhan: 96.14%","rm":22420000.0,"ahli":"Ayub bin Ismail\nKhairul Annwar bin Norhan\nRidzuan Abd Aziz bin Mohd Yusop\nNor Fadzilah binti Ishak\nMohamad Shazrul Izzuan bin Azami\nNur Hidayat bin Saharudin\nMohd Nawawi bin Che Mahmood","scores":{"K1":3,"K2":5,"K3":5,"K4":4,"K5":5,"K6":4,"K7":2},"nota":"","xrank":37},{"id":"Kementerian#34","bil":"34","kat":"Kementerian","cy":true,"entiti":"KEMENTERIAN SAINS, TEKNOLOGI DAN INOVASI (MOSTI)","agensi":"CRADLE FUND SDN BHD","tajuk":"Meningkatkan Kecekapan Kelulusan Geran CIP Sprint bagi Syarikat Pemula","penerima":"Pemohon geran CIP Sprint, syarikat pemula berasaskan teknologi dan ekosistem startup negara.\n\nData sokongan: Purata 200 permohonan setiap kitaran; 28 kelulusan digunakan bagi anggaran kos ekonomi tertangguh.","keterangan":"Cradle Fund Sdn. Bhd. melaksanakan geran CIP Sprint bagi membantu syarikat pemula dalam aktiviti pengkomersialan teknologi melalui Geran Bersyarat Pemboleh Ubah sehingga RM600,000. Sebelum reformasi, proses kelulusan mengambil masa sehingga 90 hari kerana melibatkan pitching, analyst review, FRC dan kelulusan BGIC, selain kelewatan pemohon melengkapkan dokumen serta Mesyuarat BGIC yang hanya diadakan 4 kali setahun.\nMelalui projek RKB ini, proses kelulusan ditambah baik melalui self-declaration dokumen, penetapan tempoh melengkapkan dokumen, pemberian kuasa kepada HOD untuk menolak permohonan tidak memenuhi syarat lebih awal, serta peningkatan Mesyuarat BGIC kepada 5 kali setahun. Hasilnya, tempoh kelulusan geran dipendekkan daripada 90 hari kepada 60 hari.","impak":"Kelulusan geran dipercepatkan daripada 90 hari kepada 60 hari.\nSOP kelulusan dan Piagam Pelanggan baharu diwujudkan.\nSyarikat pemula menerima keputusan pembiayaan lebih cepat.\nPembangunan prototaip dan pengkomersialan teknologi dipercepatkan.\nMenyokong pertumbuhan ekosistem startup, KDNK dan pelaburan lanjutan.\nMenjana pekerjaan bernilai tinggi dalam sektor teknologi dan inovasi.","pengiraan":"± RM3.5 juta setahun kos ekonomi tertangguh dapat dikurangkan berdasarkan kelewatan 30 hari bagi 28 kelulusan, purata geran RM500,000 dan pengganda ekonomi 3x.","rm":3500000.0,"ahli":"Norman Matthieu Vanhaecke\nJuliana Jan\nAdam Ramskay\nSitti Nursaadah Md Rusli\nIzzianni Ismail\nEizzar Suppiar\nMohamad Aizat Danial Ghazali","scores":{"K1":5,"K2":3,"K3":4,"K4":3,"K5":4,"K6":5,"K7":3},"nota":"","xrank":34},{"id":"Kementerian#35","bil":"35","kat":"Kementerian","cy":false,"entiti":"KEMENTERIAN SAINS, TEKNOLOGI DAN INOVASI (MOSTI)","agensi":"NANOMALAYSIA BERHAD (NMB)","tajuk":"Mempercepat Proses Kelulusan Product Development and Scale-Up Projects daripada 60 Hari kepada 30 Hari","penerima":"1. Technology Recipients\n2. Technology Collaborator\n3. Syarikat Penilai\n\nBagi setiap projek, terdapat 3 penerima manfaat/syarikat.\nBagi 8 projek, jumlah penerima manfaat adalah 24.","keterangan":"Kelulusan permohonan peruntukan bagi projek pembangunan produk dan peningkatan skala di bawah seliaan NanoMalaysia mengambil masa sehingga 60 hari. Kelewatan ini berpunca daripada ketidakselarasan keperluan projek dengan peraturan serta piawaian syarikat, ketidakjelasan kriteria penilaian, dan lapisan semakan yang bertindih.\n\nProses permohonan yang kompleks kerana melibatkan pelbagai pihak berkepentingan dalaman dan luaran yang memerlukan maklum balas berulang dan dokumentasi manual.\n\nAkibatnya, jadual pelaksanaan terganggu, kos meningkat akibat perubahan harga dan turun naik pasaran, serta risiko terlepas peluang memasuki pasaran untuk produk berteknologi tinggi. Kelewatan juga menjejaskan keyakinan pelabur, mengurangkan kebolehcapaian dana kepada syarikat pemula, dan melewatkan kitaran inovasi negara.","impak":"Tempoh kelulusan projek dikurangkan 50%, daripada 60 hari kepada 30 hari.\nUjikaji menunjukkan purata proses sebenar 23 hari, lebih baik daripada sasaran.\nPenilaian kertas permohonan dipendekkan daripada 40 hari kepada 20 hari.\nKelulusan permohonan dipendekkan daripada 20 hari kepada 10 hari.\nMenarik pelaburan berimpak tinggi dalam bidang teknologi dan inovasi.\nMenyokong penambahan 500 pekerjaan berkemahiran tinggi dalam tempoh 2 tahun.\nMeningkatkan kadar komersialisasi R&D tempatan daripada ±10% kepada 25% menjelang akhir 2025.\nMerangsang pertumbuhan startup dan syarikat spin-off berasaskan penyelidikan.","pengiraan":"Jumlah penjimatan: RM618,960 setahun\n\nKos sebelum: RM697,920\nKos selepas: RM78,960\n\nPenjimatan diperoleh melalui penghapusan kos peluang komersial RM540,000 bagi 8 projek dan pengurangan kos tenaga kerja sebanyak RM78,960 selepas tempoh kelulusan dipendekkan daripada 60 hari kepada 30 hari.","rm":618960.0,"ahli":"Mohammad Nur Shafiqe Haliman\nVeronica Leong Mun Sum\nNur Diyana Syazwani Zambri\nNatasha Izzati Mohd Yazid\nWan Roslina Wan Mustafa\nAimi Athirah Zainal Abidin\nMuhammad Nasiff Hashardi\nLee Wen Xuan\nKhairul Anwar Ahmad","scores":{"K1":5,"K2":4,"K3":3,"K4":4,"K5":5,"K6":5,"K7":3},"nota":"","xrank":0},{"id":"Kementerian#36","bil":"36","kat":"Kementerian","cy":true,"entiti":"KEMENTERIAN SAINS, TEKNOLOGI DAN INOVASI (MOSTI)","agensi":"BAHAGIAN DANA","tajuk":"Meningkatkan Kecekapan Pengurusan Permohonan Dana Penyelidikan dan Pembangunan (R&D) MOSTI","penerima":"Syarikat Perusahaan Kecil dan Sederhana\nSyarikat Pemula\nPersatuan dan Pertubuhan Bukan Kerajaan\nIndividu\nRakan Collaborator\nPengguna Teknologi\nInstitusi PENDIDIKAN Tinggi (Awam dan Swasta)\nInstitut Penyelidikan Kerajaan\nAnggaran bilangan penerima manfaat, bagi 240 projek setahun = 240,000","keterangan":"Bahagian Dana MOSTI mengurus permohonan Dana R&D yang sebelum ini mengambil masa sehingga 45 hari bekerja kerana semua permohonan perlu melalui Mesyuarat JPD dan keputusan akhir JKD. Berdasarkan statistik RMK-12, kadar kelulusan hanya 7.07%, dengan purata 240 permohonan setahun, 17 projek lulus dan 223 projek gagal.\n\nMelalui projek RKB ini, proses ditambah baik melalui penilaian awal / peer review, semakan dokumen, pitching ringkas, penurunan kuasa penolakan projek gagal kepada JPD dan hanya projek berimpak tinggi dibawa ke JKD. Hasilnya, pemakluman keputusan dipercepatkan kepada 20 hari bekerja bagi projek gagal dan 30 hari bekerja bagi projek lulus.","impak":"Keputusan projek gagal dipercepatkan daripada 45 hari kepada 20 hari bekerja.\nKeputusan projek lulus dipercepatkan daripada 45 hari kepada 30 hari bekerja.\nTapisan awal / peer review mengurangkan beban birokrasi pemohon.\nProjek gagal tidak perlu dibawa ke JKD, menjimatkan masa panel dan urus setia.\nMasa panel luar dikurangkan daripada 3 jam kepada 2 jam.\nMasa urus setia projek gagal dikurangkan daripada 6 jam kepada 3 jam.\nPenjimatan kos pematuhan sebanyak RM5.039 juta setahun.\nMenyokong pelaksanaan projek R&D berimpak tinggi dan pembangunan teknologi tempatan.","pengiraan":"Penjimatan: RM5.039 juta setahun\n\nKos sebelum: RM9.468 juta setahun\nKos selepas: RM4.429 juta setahun\nPenjimatan diperoleh melalui pengurangan kos pemohon sebanyak RM4.898 juta, kos panel penilai RM108,000 dan kos operasi urus setia RM33,450 selepas pelaksanaan tapisan awal serta penurunan kuasa penolakan projek gagal kepada JPD.","rm":5039000.0,"ahli":"Norbaya binti Othman\nNurru Adila binti Ibrahim\nShahrul Ramadhan bin Yahaya\nSiti Murnirah binti Jaafar\nSiti Famida binti Zulkifli\nFarah Adibah binti Harun\nMohd Faiz bin Mohd Azahar\nRamizatulsafani binti Ramli","scores":{"K1":3,"K2":4,"K3":4,"K4":4,"K5":5,"K6":4,"K7":2},"nota":"","xrank":13},{"id":"Kementerian#37","bil":"37","kat":"Kementerian","cy":true,"entiti":"KEMENTERIAN KEWANGAN (MOF)","agensi":"JABATAN PENILAIAN HARTA (JPPH)","tajuk":"Meningkatkan Keberkesanan dan Kecekapan Permohonan Data Transaksi Harta Tanah secara Dalam Talian (e-Data)","penerima":"1.Pemain Industri Harta Tanah\n2. Penyelidik\n3. Pelajar\n4. Orang awam","keterangan":"Penambahbaikkan masa, ketepatan dan kualiti data serta kepuasan pengguna dalam Proses akses data transaksi harta tanah\n\nProjek mula Julai 2024 - Julai 2025\n\nIsu:\nMasa membuat carian data yang lama – disebabkan Sistem Data Transaksi Terbuka dalam bentuk tabular (table) menyukarkan pengguna untuk mengenalpasti lokasi maklumat sebenar yang diperlukan secara cepat dan tepat,\nData yang diterima kurang tepat – tidak memberikan maklumat transaksi mengikut lokasi spesifik kepada pengguna, maklumat hanya berdasarkan lokasi umum sahaja disebabkan sistem Data Transaksi Terbuka tidak mempunyai fungsi carian lokasi di atas peta bagi mendapatkan data di lokasi yang sebenar.\nMasa pembelian data yang lama – kaedah pembayaran manual di bank dan pengambilan data di cawangan.","impak":"Mempercepatkan akses maklumat transaksi hartanah.\nMeningkatkan ketepatan dan kebolehpercayaan data.\nMenyediakan data yang lebih berkualiti dan teratur.\nMeningkatkan kepuasan pengguna terhadap perkhidmatan data.\nMenyokong proses pembuatan keputusan yang lebih berkesan. Data driven decision.\nMeningkatkan kecekapan dan produktiviti organisasi.","pengiraan":"Jumlah Penjimatan Swasta dan Awam =\nRM 19,356,278.40\nAnggaran kos pelaksanaan penambahbaikan = RM 1,408,242.86\nJumlah pulangan kepada Negara = RM 17,948,035.54 (opportunity cost)","rm":19356278.4,"ahli":"Sr. Abdul Rahman bin Mohd Nasir\nKamarul Hisyam bin Saberi\nSr. J l":"39","kat":"Kementerian","cy":false,"entiti":"KEMENTERIAN KEWANGAN (MOF)","agensi":"BAHAGIAN KAWALAN KEWANGAN STRATEGIK DAN KORPORAT (BKSK)","tajuk":"Penubuhan Pusat Transformasi Bandar (UTC) di Seberang Perai, Butterworth, Pulau Pinang","penerima":"Rakyat","keterangan":"Langkah ini dapat memperluaskan akses perkhidmatan Kerajaan secara lebih menyeluruh, mengurangkan kebergantungan terhadap UTC sedia ada serta menangani isu kesesakan dan kelewatan perkhidmatan. Usaha tersebut juga berupaya mempercepatkan proses penyampaian, meningkatkan kepuasan rakyat dan memperkukuh aspirasi Kerajaan dalam mewujudkan penyampaian perkhidmatan awam yang lebih cekap, mesra rakyat dan inklusif.","impak":"Peningkatan tahap kepuasan rakyat terhadap perkhidmatan awam\nPeningkatan kecekapan penyampaian perkhidmatan awam\nPenyumbang kepada keterangkuman sosial dan wilayah\nPeningkatan produktiviti rakyat\nModel pusat sehenti moden yang boleh direplikasi ke negeri lain","pengiraan":"Waktu operasi melangkaui waktu pejabat biasa, iaitu dari 8.00 pagi hingga 9.00 malam, beroperasi setiap hari Isnin hingga Ahad.\nSejak mula beroperasi pada 3 November hingga 21 November 2025, analisis masa menunggu menunjukkan bahawa secara purata 541 pelanggan setiap hari telah berjaya dilayan dalam tempoh kurang daripada 10 minit.\nMembantu menjimatkan masa pengguna, memandangkan mereka tidak perlu lagi berurusan di UTC KOMTAR dan boleh mendapatkan perkhidmatan yang sama dengan lebih mudah di UTC Seberang Perai","rm":null,"ahli":"Zeti Arzura binti Tajul Ariff\nDesmond Anggang ak Tading\nMawarni binti Ramli\nFarhana binti Aris\nAhmad Darwin Ezahan bin Abdul  Hamid\nFatin Nublah binti Mohamad Ishak\nAhmad Syahmie bin Roselan","scores":{"K1":3,"K2":1,"K3":2,"K4":3,"K5":3,"K6":5,"K7":3},"nota":"K3 dihad 2: tiada nilai RM/peratus","xrank":0},{"id":"Kementerian#40","bil":"40","kat":"Kementerian","cy":false,"entiti":"KEMENTERIAN KEWANGAN (MOF)","agensi":"BAHAGIAN AKAUN","tajuk":"Meningkatkan Kecekapan Proses Semak  dan Garis Panduan ICT","penerima":"Pembekal Perkhidmatan ICT, kementerian, agensi kerajaan dan pihak berkepentingan sektor awam.","keterangan":"Projek ini menyatukan, mengemaskini, dan memansuhkan 9 dasar/pekeliling ICT lama kepada 4 Pekeliling Pendigitalan Perkhidmatan Awam (PPPA) 2025 untuk mengurangkan pertindihan, memudahkan rujukan, mempercepat keputusan, dan meningkatkan kecekapan tadbir urus digital sektor awam.","impak":"Meningkatkan kecekapan penyampaian digital sektor awam melalui proses yang lebih pantas, konsisten dan berkesan.\nMengurangkan risiko pematuhan dan isu audit ICT dengan penyelarasan dasar, pekeliling dan garis panduan yang lebih sistematik.\nMemperkukuh tadbir urus ICT sektor awam melalui keputusan yang lebih tepat, seragam dan telus.\nMeningkatkan produktiviti organisasi melalui penjimatan 11,616 jam pegawai setahun.\nMengurangkan beban dokumentasi dan kos pematuhan dengan penyatuan enam (6) dokumen kepada satu (1) pekeliling komprehensif serta penjimatan produktiviti sektor ICT bernilai RM11.6 juta setahun.","pengiraan":"1. Kos\nRM195,300 setahun dijimatkan melalui penyatuan pekeliling (6 ➝ 1).","rm":195300.0,"ahli":"Juli Dewi Yana binti Jaafar\nDr. Wan Azlin Zurita binti Wan Ahmad\nTs Dr. Sheila a/p Mahalingam\nTs. Zaim bin Zaki\nNurhaniza binti Bakri\nFarah Adila binti Mohamad Izani","scores":{"K1":4,"K2":1,"K3":3,"K4":4,"K5":3,"K6":5,"K7":3},"nota":"","xrank":0},{"id":"Kementerian#71","bil":"71","kat":"Kementerian","cy":true,"entiti":"KEMENTERIAN DIGITAL (KD)","agensi":"JABATAN DIGITAL NEGARA (JDN)","tajuk":"Mempercepat Proses Penilaian Kelulusan Teknikal Projek ICT daripada 54 Hari kepada 16 Hari","penerima":"Kementerian, agensi kerajaan Persekutuan dan Negeri, Badan Berkanun, Pihak Berkuasa Tempatan, pembekal perkhidmatan ICT, Kementerian Ekonomi, Kementerian Kewangan dan pihak berkepentingan sektor awam.","keterangan":"JTISA merupakan jawatankuasa teknikal tertinggi yang menilai dan menimbang kelulusan teknikal projek ICT sektor awam. Kelulusan teknikal ini merupakan prasyarat penting sebelum permohonan bajet dan proses perolehan projek ICT dapat diteruskan.\n\nSebelum projek RKB dilaksanakan, proses penilaian mengambil masa sehingga 54 hari bekerja disebabkan permohonan tidak lengkap, semakan berulang, kekurangan standardisasi dokumen, penyediaan spesifikasi teknikal yang tidak seragam, pertindihan skop projek ICT dan penyelarasan awal yang terhad antara agensi.\n\nBerdasarkan semakan tahun 2020–2024, sebanyak 80% daripada 389 permohonan didapati tidak lengkap dan perlu dipulangkan semula kepada pemilik projek untuk penambahbaikan.\n\nProjek ini memperkenalkan templat permohonan kelulusan teknikal JTISA yang komprehensif, senarai semak kriteria penilaian, pemetaan kepada SPA Bil. 7 Tahun 2024 serta kriteria tambahan berdasarkan Surat Arahan KSN 17 April 2025.\n\nPenambahbaikan ini menyeragamkan maklumat permohonan, mempercepat semakan awal, mengurangkan semakan berulang dan memastikan permohonan projek ICT lebih lengkap sebelum diangkat ke mesyuarat JTISA.","impak":"Impak Produktiviti:\n• Tempoh proses penilaian kelulusan teknikal berjaya dikurangkan daripada 54 hari kepada 16 hari bekerja, iaitu pengurangan 38 hari atau 70.4%.\n• Pengurangan ini menunjukkan lonjakan produktiviti proses dan mempercepat kesiapsiagaan agensi untuk meneruskan permohonan bajet serta perolehan projek ICT.\n\nImpak Kualiti Permohonan:\n• Permohonan tidak lengkap berkurang daripada 80% kepada 30% sehingga Oktober 2025.\n• Maklumat permohonan menjadi lebih lengkap, seragam dan selaras dengan kriteria penilaian SPA Bil. 7 Tahun 2024 serta Surat Arahan KSN.\n\nImpak Tadbir Urus dan Integriti:\n• Mengurangkan semakan berulang dan pertindihan skop projek ICT.\n• Meningkatkan ketepatan penyelesaian teknikal, spesifikasi projek dan anggaran kos.\n• Memperkukuh integriti pengurusan projek ICT melalui proses penilaian yang lebih telus, seragam dan berpandukan kriteria.\n\nImpak Strategik:\n• Menyokong agenda Reformasi Kerenah Birokrasi dengan mempercepat proses kelulusan teknikal projek ICT sektor awam.\n• Membantu kementerian dan agensi merancang projek ICT dengan lebih awal, lengkap dan berkesan.\n• Mempercepat pelaksanaan inisiatif pendigitalan kerajaan yang memberi manfaat kepada penyampaian perkhidmatan awam.","pengiraan":"Penjimatan sebanyak RM1.59 juta setahun.\n\nKos pematuhan sebelum RKB: RM3,179,520 setahun.\nKos pematuhan selepas RKB: RM1,589,760 setahun.\nJumlah penjimatan tahunan: RM1,589,760, bersamaan 50% pengurangan kos pematuhan.\n\nAnggaran ini mengambil kira pengurangan masa kerja pihak urus setia JTISA dan pemilik projek berdasarkan anggaran 80 permohonan setahun serta kadar kos pegawai yang digunakan.","rm":1590000.0,"ahli":"Azlinda binti Mohd Jan\nTs. Nurul Effa binti Ahmad\nDr. Zarina binti Din","scores":{"K1":5,"K2":5,"K3":4,"K4":4,"K5":5,"K6":5,"K7":3},"nota":"","xrank":33},{"id":"Kementerian#72","bil":"72","kat":"Kementerian","cy":false,"entiti":"KEMENTERIAN DIGITAL (KD)","agensi":"JABATAN DIGITAL NEGARA (JDN)","tajuk":"Meningkatkan Keberkesanan Tatakelola Pengurusan serta Perolehan Projek ICT bagi RMK-13","penerima":"Pembekal Perkhidmatan ICT, kementerian, agensi kerajaan dan pihak berkepentingan sektor awam.","keterangan":"Ketidakseragaman pemahaman dan pelaksanaan tatakelola permohonan projek ICT RMKe-13 telah menyebabkan kelewatan semakan, kesilapan permohonan serta pertindihan skop projek antara agensi.\nMenambah baik tatakelola permohonan projek ICT RMK-13.\nMenyediakan FAQ terperinci & sesi libat urus bagi membantu kementerian/agensi memahami proses permohonan.\nMenyeragamkan pelaksanaan tatakelola termasuk keperluan WoG, NACSA & CGSO.","impak":"Peningkatan kefahaman kementerian/agensi berkaitan proses permohonan projek ICT.\nMemastikan perancangan & pelaksanaan projek ICT lebih efektif, efisien & berintegriti.\nMengurangkan jumlah kesilapan permohonan teknikal.\nMempercepatkan proses penilaian teknikal.\nMenyeragamkan pemahaman tatakelola di semua peri wai MSN / urus setia sistem dan kejohanan – 50 orang\nJumlah anggaran penerima manfaat langsung: 13,100 orang","keterangan":"Projek ini membangunkan Modul Pengurusan Sukarelawan dalam Sistem Pengurusan Kejohanan bagi menyeragamkan proses pengambilan, latihan, penempatan, pemantauan dan pentadbiran sukarelawan sukan.\nSebelum reformasi, pengurusan sukarelawan dilaksanakan secara manual dan tidak bersepadu, menyebabkan proses pemilihan, latihan, penempatan serta pemantauan kehadiran sukar diselaraskan.\nKetiadaan pemantauan masa nyata menyukarkan urus setia menangani ketidakhadiran sukarelawan, penempatan tidak tepat dan keperluan penggantian segera semasa temasya berlangsung.","impak":"Pengurusan sukarelawan menjadi lebih sistematik, bersepadu dan responsif melalui modul digital yang meliputi keseluruhan kitaran pengurusan sukarelawan.\nProses pengambilan, latihan dan penempatan sukarelawan dapat diseragamkan bagi semua temasya sukan di peringkat kebangsaan dan antarabangsa.\nPemantauan kehadiran dan prestasi secara masa nyata membolehkan isu ketidakhadiran, penempatan tidak tepat dan penggantian sukarelawan ditangani dengan lebih cepat.\nBeban tugas urus setia berkurang melalui pengurangan proses manual, dokumentasi fizikal dan penyelarasan berulang.","pengiraan":"Sebelum Jumlah kos langsung dan kos peluang pengurusan sukarelawan secara manual = RM7,456,000.00\nSelepas Jumlah kos langsung dan kos peluang melalui Modul Pengurusan Sukarelawan = RM3,882,000.00\nPenjimatan = RM3,574,000.00\n48% pengurangan kos pematuhan","rm":3574000.0,"ahli":"Jefri B. Ngadirin\nAzrul Hisyam bin Abdul Jalil\nMohamad Zamri bin Napiah\nMohd Faisal bin Embong","scores":{"K1":3,"K2":3,"K3":4,"K4":4,"K5":3,"K6":3,"K7":3},"nota":"K2 dihad 3: tiada data sebelum/selepas","xrank":0},{"id":"Kementerian#124","bil":"124","kat":"Kementerian","cy":false,"entiti":"KEMENTERIAN BELIA DAN SUKAN (KBS)","agensi":"BAHAGIAN PEMBANGUNAN KEMAHIRAN BELIA","tajuk":"Mempercepat Proses Pengurusan Kursus Kemahiran Jangka Pendek daripada 12 Hari Bekerja kepada 2 Hari Bekerja","penerima":"Belia massa – 150,000 orang\nBelia minoriti dan golongan terpinggir – 780 orang\nBelia berisiko berumur 15 hingga 35 tahun – 520 orang\nPegawai penyelaras BPKB / ILKBS – 63 orang\nPengajar / tenaga pengajar kursus – 170 orang\nJumlah anggaran penerima manfaat langsung: 151,533 orang","keterangan":"BPKB menyediakan kursus kemahiran jangka pendek percuma berbentuk teknikal dan soft skills melalui program reskilling, upskilling dan multi-skilling.\nProjek ini melibatkan 170 kursus percuma dengan sasaran penyertaan 2,600 orang belia.\nSebelum reformasi, proses permohonan kursus dilaksanakan secara manual melalui Google Form / borang fizikal, menyebabkan data tidak bersepadu, semakan lambat, risiko human error dan kelewatan penyediaan sijil.\nTempoh keseluruhan proses sebelum ini mengambil masa 12 hari bekerja, merangkumi semakan dan tapisan permohonan, pemakluman keputusan, surat tawaran, pengesahan kehadiran, penilaian kursus serta penyediaan sijil.","impak":"Tempoh pengurusan kursus dikurangkan sebanyak 83.33%, daripada 12 hari bekerja kepada 2 hari bekerja.\nProses permohonan, semakan, pemakluman keputusan dan tawaran latihan dapat diselesaikan dalam 1 hari bekerja.\nProses penilaian kursus dan penjanaan sijil penyertaan dapat diselesaikan dalam 1 hari bekerja melalui automasi e-sijil.\nBeban kerja pegawai dikurangkan melalui Dashboard Belia, e-mel tawaran automatik, pemprosesan berperingkat dan notifikasi pintar.\nRisiko kehilangan data, kesilapan taip, pertindihan rekod dan kelewatan semakan dapat dikurangkan melalui data berpusat dan pemantauan secara nyata.\nBelia mendapat maklum balas dan sijil dengan lebih cepat, sekali gus meningkatkan kepuasan peserta serta mempercepat laluan ke peluang pekerjaan, latihan lanjut atau pembangunan kemahiran.","pengiraan":"Sebelum\nJumlah kos pentadbiran dan kos peluang bagi proses pengurusan kursus secara manual = RM40,560,000.00 setahun\n\nSelepas Jumlah kos pentadbiran dan kos peluang melalui Dashboard Belia = RM5,980,000.00 setahun\n\nPenjimatan = RM34,580,000.00 setahun\n\n85.26% pengurangan kos pematuhan","rm":34580000.0,"ahli":"Zakiah binti Mat Jali\nMusyrifah binti Elias\nFadzillah binti Mohamed Kasim\nFitriya binti Abu Mansur","scores":{"K1":3,"K2":5,"K3":5,"K4":5,"K5":5,"K6":3,"K7":3},"nota":"","xrank":0},{"id":"Kementerian#125","bil":"125","kat":"Kementerian","cy":false,"entiti":"KEMENTERIAN BELIA DAN SUKAN (KBS)","agensi":"AKADEMI KEJURULATIHAN KEBANGSAAN,  \nINSTITUT SUKAN NEGARA ","tajuk":"Mempercepat Proses Pengeluaran Sijil Lulus Kursus Sains Sukan Tahap I dan II daripada 60 Hari Bekerja kepada 30 Hari Bekerja","penerima":"Peserta yang lulus Kursus Sains Sukan Tahap I, II dan III – 5,000 orang\nJurulatih / bakal jurulatih  5,000 orang\nPegawai ISN / AKK – 30 orang\nPersatuan / kelab / organisasi  500 organisasi\nAtlet / peserta l 50,000 orang\nJumlah anggaran penerima manfaat: 60,030 orang dan 500 organisasi sukan","keterangan":"Proses pengeluaran sijil lulus Kursus Sains Sukan sebelum ini mengambil masa sehingga 60 hari bekerja sebelum sijil dapat dikemukakan kepada peserta.\nKelewatan berpunca daripada aliran kerja yang panjang, proses pengesahan berlapis, ketidakseragaman SOP, kekangan sumber manusia dan pengurusan secara manual.\nMelalui RKB, proses kerja ditambah baik dengan pengurangan langkah bertindih, pelaksanaan SOP baharu, peperiksaan secara dalam talian, pengesahan awal maklumat peserta dan penggunaan kaedah tandatangan yang lebih cekap.","impak":"Tempoh pengeluaran sijil dikurangkan sebanyak 50%, daripada 60 hari bekerja kepada 30 hari bekerja.\nProses penilaian peserta dipendekkan daripada 45 hari kepada 25 hari, melalui peperiksaan dalam talian dan pengurangan semakan manual.\nSemakan dokumen dipercepat daripada 4 hari kepada 1 hari melalui pengesahan awal peserta semasa kursus masih berlangsung.\nProses pengesahan keputusan, penyediaan sijil, cetakan, tandatangan dan edaran sijil turut dipendekkan kepada 1 hari bagi setiap proses utama.\nPeserta dapat melengkapkan keperluan kerjaya kejurulatihan dengan lebih awal, termasuk untuk melanjutkan ke tahap lebih tinggi dan memohon lesen kejurulatihan.\nKecekapan penyampaian perkhidmatan ISN dan AKK meningkat, sekali gus memperkukuh keyakinan peserta terhadap sistem pembangunan kejurulatihan sukan negara.","pengiraan":"Sebelum Jumlah kos operasi jabatan dan kos peluang peserta = RM21,813.60\nSelepas Jumlah kos operasi jabatan dan kos peluang peserta = RM10,906.80\nPenjimatan = RM10,906.80\n50% pengurangan kos pematuhan","rm":10906.8,"ahli":"YBrs. Dr. Vellapandian a/l Ponnusamy\nFreddy Affendi\nHisyam Arif bin Zainal Abidin","scores":{"K1":3,"K2":5,"K3":2,"K4":4,"K5":5,"K6":3,"K7":3},"nota":"","xrank":0},{"id":"Kementerian#126","bil":"126","kat":"Kementerian","cy":false,"entiti":"KEMENTERIAN BELIA DAN SUKAN (KBS)","agensi":"JABATAN BELIA DAN SUKAN NEGARA","tajuk":"Meningkatkan Kecekapan Urusan Pembayaran Tempahan Fasiliti JBSN daripada Manual kepada JomPAY Dalam Talian","penerima":"Orang awam / pengguna fasiliti JBSN – 1,599,600 potensi capaian pengguna / transaksi fasiliti setahun Badan Bukan Kerajaan (NGO) / persatuan – 500 NGO / persatuan\nWakil / urus setia NGO dan persatuan – 1,500 orang\nPegawai kaunter / pengurus kompleks / urus setia JBSN – 180 orang\nPengguna luar kawasan  – 13,900 orang / tempahan","keterangan":"JBSN mengurus lebih 1,200 fasiliti di 60 kompleks seluruh negara.\nSebelum reformasi, tempahan kemudahan boleh dibuat melalui Sistem Tempahan Fasiliti, namun proses pembayaran masih perlu dilakukan secara fizikal di kaunter.\nKaunter pembayaran hanya beroperasi antara 8.00 pagi hingga 4.00 petang, menyebabkan pengguna perlu hadir dalam waktu pejabat dan menanggung kos masa serta perjalanan.\nKeadaan ini menyukarkan pengguna luar kawasan, mengehadkan fleksibiliti pembayaran dan menjejaskan kelancaran proses tempahan fasiliti.","impak":"Proses pembayaran menjadi lebih mudah, fleksibel dan cekap kerana pengguna tidak lagi perlu hadir secara fizikal ke kaunter.\nTempoh proses pembayaran dan penggunaan fasiliti dipendekkan daripada anggaran 7 hari kepada 1 hari.\nKos masa kakitangan dikurangkan daripada RM75.00 kepada RM15.00 bagi setiap tempahan.\nKos peluang pengguna dikurangkan daripada RM3,500.00 kepada RM500.00 bagi setiap tempahan.\nBerdasarkan 46,333 tempahan sehingga Oktober 2025, jumlah kos pematuhan tahunan dikurangkan daripada RM165,640,475.00 kepada RM23,861,495.00.\nProjek ini meningkatkan imej JBSN dan KBS sebagai penyedia perkhidmatan fasiliti sukan yang lebih moden, telus dan responsif","pengiraan":"Sebelum\nJumlah kos masa kakitangan dan kos peluang bagi pembayaran tempahan fasiliti secara manual di kaunter = RM165,640,475.00 setahun\n\nSelepas\nJumlah kos masa kakitangan dan kos peluang melalui pembayaran dalam talian JomPAY = RM23,861,495.00 setahun\n\nPenjimatan = RM141,778,980.00 setahun\n\n85.59% pengurangan kos pematuhan","rm":141778980.0,"ahli":"Azura binti Abidin\nAnuar bin Hamid","scores":{"K1":5,"K2":1,"K3":5,"K4":3,"K5":3,"K6":5,"K7":2},"nota":"","xrank":0},{"id":"Kementerian#127","bil":"127","kat":"Kementerian","cy":false,"entiti":"KEMENTERIAN PELABURAN, PERDAGANGAN DAN INDUSTRI (MITI)","agensi":"PERBADANAN PRODUKTIVITI MALAYSIA (MPC)","tajuk":"Mempercepat  Kelulusan Permit Kebenaran Merancang Petak Pengecasan Kenderaan Elektrik (EVCB) daripada 28 Hari ke 3 Hari","penerima":"Pemain Industri dalam ekosistem EV termasuk:\nPelabur & Pemaju Infrastruktur EV\nPemaju hartanah\nOperator pengecasan EV\nPenyedia infrastruktur\nAgensi Teknikal\nPengguna EV / Rakyat","keterangan":"Proses kelulusan Permit Kebenaran Merancang EVCB sebelum ini mengambil masa sehingga 28 hari dan melibatkan 14 prosedur kerja yang kompleks, menyebabkan kelewatan pelaksanaan projek, peningkatan beban pematuhan serta ketidakpastian kepada pelabur dan pemaju, sekali gus menjejaskan kecekapan pembangunan ekosistem EV negara.\nPengurangan Prosedur Kerja untuk Kelulusan Pelan (dari 14  kepada 3 Prosedur telsh dibuat","impak":"Pengurangan prosedur kerja adalah sebanyak 78.6% (daripada 14 kepada 3 prosedur\nMeminimumkan proses tidak kritikal.dan memudahkan urusan pihak industri dalam pembangunan infrastruktur EV.\nMengurangkan beban pematuhan serta meningkatkan kepastian peraturani kepada pelabur dan pemaju.\nMenyokong agenda peralihan tenaga negara melalui pemudahcaraan infrastruktur kenderaan elektrik.","pengiraan":"Penjimatan kos pematuhan tahunan sebanyak RM1.2 juta","rm":1200000.0,"ahli":"Mohammed Alamin Rehan\nMahadi Hasbullah\nMohammad Khairul Hakimin Zainoor\nMohd Hilmi Mohd Idris","scores":{"K1":5,"K2":5,"K3":4,"K4":3,"K5":5,"K6":5,"K7":2},"nota":"","xrank":0},{"id":"Kementerian#128","bil":"128","kat":"Kementerian","cy":false,"entiti":"KEMENTERIAN PELABURAN, PERDAGANGAN DAN INDUSTRI (MITI)","agensi":"MAJLIS PENGUKURAN KEBANGSAAN (NMIM)","tajuk":"Meningkatkan Kecekapan Pemantauan Aliran Kerja Perkhidmatan NMIM secara Bersepadu","penerima":"•Metrologist iaitu pelaksana tentukuran.\n•Badan kawalselia (pemilik akta berkaitan pengukuran seperti Jabatan Alam Sekitar, Jabatan Pengangkutan Jalan)\n•Makmal-makmal akreditasi iaitu makmal diakredit MS ISO/IEC 17025 yang melaksana perkhidmatan tentukuran kepada pihak industri dan pengilang.","keterangan":"Pengurusan pemantauan aliran kerja perkhidmatan NMIM sebelum ini dilaksanakan secara manual dan tidak bersepadu, menyebabkan kebergantungan kepada emel, telefon dan laporan berkala.\nKeadaan ini mengakibatkan kelewatan maklumat, ketidakseragaman data serta keperluan semakan berulang dan koordinasi manual yang tinggi.\nPembangunan NMIM Information System (NIS) untuk meningkatkan kualiti dan kecekapan penyampaian perkhidmatan secara bersepadu dan membolehkan pemantauan berpusat secara real-time.  Ini meningkatkan produktiviti operasi, mengurangkan rework serta memperkukuh ketelusan, akauntabiliti dan kecekapan ekosistem pengukuran negara","impak":"Pendigitalan proses meningkatkan kecekapan pemantauan aliran kerja perkhidmatan tentukuran NMIM secara bersepadu.\nMempercepat proses pemantauan, pengesanan status kerja dan tindakan susulan melalui pembangunan NMIM Information System (NIS).\nMeningkatkan ketelusan (transparency) dan kebolehkesanan (traceability) aliran kerja perkhidmatan metrologi kepada semua pihak berkepentingan.\nMemperkukuh keyakinan industri dan regulator terhadap sistem pengukuran negara yang lebih efisien, tepat dan boleh dipercayai.","pengiraan":"Penjimatan kos pematuhan tahunan sebanyak RM1.05 juta","rm":1050000.0,"ahli":"Irene Safinaz Hassan\nAzirah Zainol","scores":{"K1":4,"K2":3,"K3":4,"K4":4,"K5":3,"K6":5,"K7":2},"nota":"K2 dihad 3: tiada data sebelum/selepas","xrank":0},{"id":"Kementerian#129","bil":"129","kat":"Kementerian","cy":false,"entiti":"KEMENTERIAN PELABURAN, PERDAGANGAN DAN INDUSTRI (MITI)","agensi":"MALAYSIA STEEL INSTITUTE (MSI)","tajuk":"Mengurangkan Masa Menunggu Pembayaran Elaun Peserta Program Latihan Industri Besi dan Keluli daripada 8 Minggu ke 6 Minggu","penerima":"xxx","keterangan":"Proses pembayaran elaun  peserta Program Latihan Industri Besi dan Keluli  MSI  mengambil masa lama disebabkan kelewatan penerimaan dan pengesahan dokumen sokongan, khususnya surat tawaran daripada pihak syarikat.\nKebergantungan kepada susulan yang tidak berstruktur telah menyebabkan ketidakcekapan proses end-to-end, sekali gus melambatkan pembayaran dan , meningkatkan beban pentadbiran.\nMelalui penyusunan semula proses secara end to end, penyedia latihan yang dilantik oleh MSI melaksanakan pemantauan dan susulan secara mingguan dengan pegawai sumber manusia syarikat bagi memastikan surat tawaran serta dokumen berkaitan pembayaran elaun diterima dengan lengkap sebaik sahaja latihan tamat dan peserta mula menyertai syarikat.\nPendekatan ini  mengurangkan kelewatan akibat dokumen tidak lengkap.","impak":"Mengurangkan kelewatan penghantaran dokumen sokongan oleh syarikat dan penyedia latihan.\nMeningkatkan kepuasan peserta latihan industri melalui penerimaan elaun yang lebih cepat dan teratur.\nMengurangkan beban pentadbiran serta risiko tunggakan pembayaran.","pengiraan":"Penjimatan kos pematuhan tahunan sebanyak RM350,000 setahun","rm":350000.0,"ahli":"Leon Lai Leong Chon\nAkmal Fahmi","scores":{"K1":3,"K2":1,"K3":3,"K4":3,"K5":3,"K6":3,"K7":3},"nota":"","xrank":0},{"id":"Kementerian#130","bil":"130","kat":"Kementerian","cy":false,"entiti":"KEMENTERIAN PELABURAN, PERDAGANGAN DAN INDUSTRI (MITI)","agensi":"PERBADANAN PRODUKTIVITI MALAYSIA (MPC)","tajuk":"Meningkatkan Kecekapan Libat Urus Dalam Talian","penerima":"Komuniti Perniagaan, Rakyat , Jawatankuasa Dasar dan Unit perundangan","keterangan":"Libat urus awam dalam talian sebelum ini dilaksanakan melalui pelbagai saluran yang tidak bersepadu dan kurang standard, menyebabkan pengurusan maklum balas tidak sistematik serta bergantung kepada proses manual.\nKeadaan ini menjejaskan kecekapan konsultasi, ketelusan dan keberkesanan penggubalan dasar berasaskan bukti, serta tidak selari dengan prinsip Good Regulatory Practice (GRP)\nMewujudkan Unified Public Consultation Platform (single window) sebagai satu platform berpusat libat urus awam bagi menyatukan semua proses konsultasi dasar dan peraturan dalam satu ekosistem digital yang standard, telus dan bersepadu. Inisiatif ini memperkukuh pelaksanaan GRP) melalui penyeragaman proses, pengurangan fragmentasi saluran serta peningkatan keupayaan analisis maklum balas secara sistematik.\nPlatform ini juga membolehkan pemprosesan maklum balas secara digital dan berasaskan data, termasuk automasi pengumpulan, pengelasan dan pelaporan bagi menyokong penggubalan dasar yang lebih pantas, berasaskan bukti dan berimpak tinggi.","impak":"Meningkatkan keyakinan pemegang taruh terhadap proses pembuatan dasar kerajaan yang lebih inklusif dan responsif\nmemperkukuh pelaksanaan Good Regulatory Practice (GRP) melalui peningkatan ketelusan, kecekapan dan kualiti penggubalan dasar berasaskan bukti di peringkat nasional\nKomuniti perniagaan dan rakyat Menikmati proses konsultasi yang lebih telus, mudah diakses dan konsisten, serta mengurangkan ketidakpastian peraturani.","pengiraan":"Penjimatan kos pematuhan tahunan sebanyak RM1.8 juta setahun","rm":1800000.0,"ahli":"Azlin Alias\nDr. Yogesvari Sambasevam\nNor Halisa Mohamad Halil","scores":{"K1":5,"K2":1,"K3":4,"K4":5,"K5":3,"K6":5,"K7":3},"nota":"","xrank":0},{"id":"Kementerian#131","bil":"131","kat":"Kementerian","cy":true,"entiti":"KEMENTERIAN KOMUNIKASI (KK)","agensi":"PERBADANAN KEMAJUAN FILEM NASIONAL MALAYSIA (FINAS)","tajuk":"Meningkatkan Kecekapan Pengurusan Dana Kandungan Kreatif (DKK) (Sektor Filem)","penerima":"Penggiat industri kreatif (Sektor filem)\nPegawai FINAS","keterangan":"Penambahbaikan pengurusan Dana Kandungan Kreatif (DKK) sektor filem melalui pemantauan milestone yang lebih tersusun bagi memastikan pelaksanaan projek lebih patuh, lancar dan berkesan.\n\nMemperkukuh semakan milestone daripada peringkat pra-produksi hingga output akhir.\n\nMenangani isu dokumen tidak lengkap, skrip akhir belum mantap dan bahan offline tidak memenuhi spesifikasi.\n\nMemastikan penerima dana melaksanakan projek mengikut kontrak, jadual dan syarat pembayaran yang ditetapkan.","impak":"Pemantapan tadbir urus dana awam yang memberi kesan langsung kepada kelancaran produksi, kebajikan penggiat industri dan pembangunan ekonomi kreatif negara.\n\nTadbir urus dana lebih telus, cekap dan responsif.\n\nPembayaran milestone lebih lancar dan risiko kelewatan bayaran dapat dikurangkan.\n\nAliran tunai produksi lebih stabil serta kebajikan kru, pelakon dan vendor lebih terjamin.\n\nProfesionalisme penggiat industri meningkat dan peluang pekerjaan industri kreatif dapat dijana.","pengiraan":"RM 1.16 Juta setahun","rm":1160000.0,"ahli":"Mohd Fazli Abdul Aziz\nMat Yusop Hassan\nNurhidayah Mustaffa\nMuhammad Zadhir Hussin","scores":{"K1":5,"K2":1,"K3":4,"K4":3,"K5":3,"K6":5,"K7":3},"nota":"","xrank":42},{"id":"Kementerian#132","bil":"132","kat":"Kementerian","cy":true,"entiti":"KEMENTERIAN KOMUNIKASI (KK)","agensi":"SURUHANJAYA KOMUNIKASI DAN MULTIMEDIA MALAYSIA (SKMM)","tajuk":"Meningkatkan Keberkesanan Kawal Selia Platform Dalam Talian bagi Persekitaran Digital Selamat","penerima":"Pengguna platform dalam talian\nSKMM dan agensi penguatkuasaan berkaitan\nPenyedia perkhidmatan pesanan Internet (cth: Telegram, WhatsApp, Facebook Messenger, and WeChat)\nPenyedia perkhidmatan media sosial (cth: Facebook, Instagram, TikTok, dan YouTube)","keterangan":"Pemerkasaan kawal selia platform dalam talian bagi memastikan penyedia media sosial dan aplikasi mesej dalam talian berskala besar lebih bertanggungjawab dalam menangani kemudaratan digital.\nMemfokuskan kepada platform berskala besar yang mempunyai sekurang-kurangnya 8 juta pengguna di Malaysia.\nMemperkukuh pematuhan penyedia platform terhadap tanggungjawab keselamatan pengguna.\nMembolehkan tindakan kawal selia yang lebih jelas terhadap risiko seperti CSAM, penipuan dalam talian, judi dalam talian, ucapan kebencian dan buli siber.\nMenyokong persekitaran dalam talian yang lebih selamat, dipercayai dan bertanggungjawab.","impak":"Keberkesanan kawal selia platform dalam talian dipertingkatkan bagi mewujudkan persekitaran digital yang lebih selamat, bertanggungjawab dan dipercayai pengguna\nRisiko CSAM, penipuan dalam talian, judi dalam talian, ucapan kebencian dan buli siber dapat dikurangkan.\nAkauntabiliti penyedia platform terhadap keselamatan pengguna diperkukuh.\nSKMM dapat melaksanakan pemantauan dan penguatkuasaan dengan lebih jelas dan berkesan.\nKeyakinan rakyat terhadap ekosistem digital negara dapat ditingkatkan.","pengiraan":"RM 12.75 Juta Setahun","rm":12750000.0,"ahli":"Devi Annamalai\nSuhaimi Sahree\nWan Nor Sarah Wan Shahriman\nZethy Suhaidah Zainudin","scores":{"K1":4,"K2":1,"K3":5,"K4":3,"K5":3,"K6":3,"K7":2},"nota":"","xrank":43},{"id":"Kementerian#133","bil":"133","kat":"Kementerian","cy":true,"entiti":"KEMENTERIAN DIGITAL (KD)","agensi":"JABATAN PERLINDUNGAN DATA PERIBADI (JPDP)","tajuk":"Meningkatkan Ketelusan Proses Pemberitahuan Pelanggaran Data (DBN)","penerima":"Pengawal Data, Pemproses Data, pemberi aduan, rakyat, industri dan JPDP","keterangan":"Projek ini bertujuan menambah baik dan mendigitalkan proses pengurusan Data Breach Notification (DBN) di JPDP melalui pembangunan SOP dan aliran proses baharu, platform pelaporan DBN berpusat, dashboard pemantauan masa nyata serta repositori data digital.\n\nProjek ini menggantikan proses manual melalui e-mel dan surat fizikal yang menyebabkan maklumat berselerak, tiada nombor rujukan unik, status kes sukar dipantau dan analisis dibuat secara manual.\n\nMelalui pelaksanaan Sistem Perlindungan Data Peribadi (SPDP), semua laporan DBN dapat diterima, direkod, dijejak dan dipantau secara berpusat bagi mempercepatkan tindakan penguatkuasaan di bawah Akta Perlindungan Data Peribadi 2010 [Akta 709].\n\nProjek ini menyokong agenda Reformasi Kerenah Birokrasi (RKB) melalui pengurangan proses manual, peningkatan ketelusan, pemantauan SLA, standardisasi data, pengurangan kos pematuhan industri dan pengukuhan tadbir urus perlindungan data peribadi negara.","impak":"• Meningkatkan kecekapan penguatkuasaan Akta 709 melalui pelaporan DBN yang lebih cepat, tersusun dan boleh dipantau.\n\n• Mengurangkan kelewatan proses koordinasi CA/RCA daripada anggaran 1–3 bulan kepada sekitar 7 hari, bersamaan pengurangan tempoh menunggu secara signifikan.\n\n• Mengurangkan masa koordinasi manual CA/RCA daripada 20 jam kepada 5 jam bagi setiap kes melalui automasi, dashboard SLA dan repositori data berpusat.\n\n• Meningkatkan ketelusan pengurusan kes DBN melalui nombor rujukan unik, tracking status kes, audit trail dan dashboard pemantauan masa nyata.\n\n• Mengurangkan beban kerja pegawai JPDP melalui pengurangan semakan manual, carian e-mel, penyimpanan dokumen fizikal dan kemas kini berulang.\n\n• Meningkatkan keyakinan rakyat, industri dan pelabur terhadap tadbir urus perlindungan data peribadi serta ekosistem ekonomi digital negara.","pengiraan":"Sebelum:\nJumlah kos pematuhan semasa dianggarkan sebanyak RM1,334,000 setahun.\n\nSelepas:\nJumlah kos pematuhan selepas pelaksanaan SPDP dianggarkan sebanyak RM598,000 setahun.\n\nPenjimatan:\nRM736,000 setahun\n\nBersamaan 55% pengurangan kos pematuhan.\n\nPenjimatan ini diperoleh melalui pengurangan kos koordinasi CA/RCA, pengurangan masa menunggu, pengurangan kerja manual JPDP dan penggunaan platform pelaporan DBN berpusat secara digital.","rm":736000.0,"ahli":"Ts. Saiyed Mohd Akhbarino bin Saiyed Mohd Akhir\nNadia Fadhila binti Ehwan\nSiti Nur Amalina binti Selamat\nThariq Nurshabuddin bin Fadzirulhisham","scores":{"K1":5,"K2":5,"K3":3,"K4":5,"K5":5,"K6":5,"K7":3},"nota":"","xrank":8},{"id":"Kementerian#134","bil":"134","kat":"Kementerian","cy":false,"entiti":"KEMENTERIAN DIGITAL (KD)","agensi":"JABATAN PERLINDUNGAN DATA PERIBADI (JPDP)","tajuk":"Menambahbaik Ketelusan Proses Pemilihan Pemeriksaan Fizikal Pengawal Data","penerima":"Organisasi atau syarikat yang terdiri daripada 13 golongan Pengawal Data / Data Controller","keterangan":"Projek ini bertujuan menambahbaik proses pemilihan Pengawal Data untuk pemeriksaan fizikal dengan tidak lagi bergantung kepada markah merit penilaian kendiri semata-mata.\nProjek mencadangkan pembangunan pendekatan penilaian risiko yang lebih menyeluruh dan berstruktur sebagai asas pemilihan pemeriksaan fizikal.\nRisiko dinilai berdasarkan faktor seperti saiz organisasi, bilangan aduan, jenis data peribadi yang diproses, sejarah ketidakpatuhan, sektor industri dan tahap pendedahan kepada data sensitif.","impak":"Meningkatkan kefahaman Pengawal Data berkenaan pematuhan terhadap Akta 709 melalui proses penilaian kendiri.\nMeningkatkan kepercayaan masyarakat terhadap industri dalam pemprosesan data peribadi selaras dengan kehendak Akta 709.\nMengurangkan insiden pelanggaran data peribadi dan aduan masyarakat terhadap Pengawal Data.\nMenjadikan ahun\n\nPengurangan kos pematuhan = 53.3%","rm":24150000.0,"ahli":"Ir. Mohd Yusop bin Mohamad\nIr. Mohd Fairuz bin Izani\nNurul Atiqah binti Ali\nMuhamad Hanzalah bin Huzaizi\nMohd Affandi bin Razali\nMohd Zuraimy bin Chek Din\nNorzuzana binti Mustafa\nMohd Saiful bin Mat Deli@Abdul Manan","scores":{"K1":3,"K2":1,"K3":5,"K4":4,"K5":3,"K6":4,"K7":2},"nota":"","xrank":0},{"id":"Kementerian#153","bil":"153","kat":"Kementerian","cy":false,"entiti":"KEMENTERIAN PENGANGKUTAN MALAYSIA (MOT)","agensi":"LEMBAGA PELABUHAN JOHOR","tajuk":"Mempercepatkan Pengeluaran Lesen Pemaliman dari 5 Hari kepada 3 Hari ","penerima":"Pengguna Pelabuhan\nAgen perkapalan\nOperator Pelabuhan \n","keterangan":"Projek ini dilaksanakan bagi memperkasakan prosedur sedia ada dan meningkatkan keberkesanan proses pengeluaran lesen melalui Marine Management System (MMS). \nSebelum ini, tempoh pengeluaran lesen mengambil masa sehingga 5 hari. \nBagi meningkatkan kecekapan penyampaian perkhidmatan, Lembaga Pelabuhan Johor melaksanakan penambahbaikan proses melalui sistem MMS sehingga berjaya memendekkan tempoh pengeluaran lesen kepada 3 hari sahaja.","impak":"Mencapai penambahbaikan sebanyak 40% dengan mengurangkan tempoh pengeluaran lesen daripada 5 hari kepada 3 hari. \nMembolehkan keputusan lesen diketahui dengan lebih cepat melalui 100% pengeluaran lesen dalam tempoh 3 hari bagi tahun 2025. \nMeningkatkan pematuhan aktiviti pelabuhan melalui pengurusan lesen yang lebih cekap dan berkesan. ","pengiraan":"Purata kos masa pegawai syarikat/agen perkapalan: RM50/jam\nKos peluang kelewatan operasi pelabuhan: RM500/hari\nBilangan permohonan lesen setahun: 2,000 permohonan\n\nSebelum Penambahbaikan\n\nMasa penyediaan permohonan dan susulan: 2 jam\n\nTempoh pengeluaran lesen: 5 hari\n\nKos masa kerja = 2 jam × RM50 = RM100\n\nKos peluang = 5 hari × RM500 = RM2,500\n\nKos Pematuhan Sebelum = RM2,600 setiap permohonan\n\nSelepas Penambahbaikan\n\nMasa penyediaan permohonan dan susulan: 1 jam\n\nTempoh pengeluaran lesen: 3 hari\n\nKos masa kerja = 1 jam × RM50 = RM50\n\nKos peluang = 3 hari × RM500 = RM1,500\n\nKos Pematuhan Selepas = RM1,550 setiap permohonan\n\nPenjimatan\n\nPenjimatan setiap permohonan\n\n= RM2,600 − RM1,550\n\n= RM1,050\n\nPenjimatan kos pematuhan setahun\n\n= RM1,050 × 2,000 permohonan\n\n= RM2,100,000 setahun\n\nPengurangan kos pematuhan = 40.4%","rm":2100000.0,"ahli":"Puan Ts.Norzie Hasnira binti Ramlan\nDr Azhar bin Hasrin\nTs.Noor Rahayu binti Nasikon\nMohd Lotfi bin Puniran\nDino Asmara bin Sham","scores":{"K1":3,"K2":5,"K3":4,"K4":3,"K5":5,"K6":3,"K7":2},"nota":"","xrank":0},{"id":"Kementerian#154","bil":"154","kat":"Kementerian","cy":false,"entiti":"KEMENTERIAN PENGANGKUTAN MALAYSIA (MOT)","agensi":"LEMBAGA PELABUHAN JOHOR","tajuk":"Meningkatkan Kecekapan Pengurusan Krisis Pelabuhan\n","penerima":"Sektor Maritim\nIndustri Pelabuhan\n3. Sektor Keselamatan Pelabuhan","keterangan":"Projek ini dilaksanakan bagi meningkatkan kecekapan pengurusan krisis dan penyampaian maklumat di pelabuhan melalui aplikasi MyCrisisRoom. \nSebelum ini, proses manual menggunakan pelbagai borang menyebabkan tempoh pelaporan yang panjang, respon yang lambat serta meningkatkan risiko kesilapan manusia dan kesukaran penyelarasan antara jabatan. \nBagi mengatasi isu ini, Lembaga Pelabuhan Johor membangunkan aplikasi MyCrisisRoom untuk menyatukan proses pelaporan dan pengurusan krisis secara digital, sekali gus mempercepatkan penyampaian maklumat, meningkatkan ketepatan data dan memperkukuh koordinasi antara fasiliti pelabuhan. ","impak":"Mempercepatkan penyampaian maklumat dan tindak balas krisis melalui pemprosesan maklumat secara masa nyata.\nMemperkukuhkan penyelarasan dan komunikasi antara jabatan serta fasiliti pelabuhan melalui penggunaan platform digital yang berpusat.\nMeningkatkan keberkesanan pengurusan keselamatan bagi pelbagai jenis fasiliti pelabuhan yang mempunyai keperluan keselamatan dan protokol operasi yang berbeza.\nMengoptimumkan sumber keselamatan  be ,"penerima":"Penduduk di kawasan MBIP","keterangan":"Jabatan Kejuruteraan, Majlis Bandaraya Iskandar Puteri (MBIP) berhadapan dengan isu kelewatan penyelesaian aduan awam melebihi tempoh 14 hari sebagaimana ditetapkan dalam Manual Pengurusan Aduan Awam MBIP (Pindaan Januari 2020) yang berpunca daripada aliran kerja aduan yang panjang melibatkan pelbagai peringkat daripada penerimaan, penugasan, penyiasatan, tindakan pembaikan oleh kontraktor penyelenggaraan hingga ke pengesahan penutupan dalam sistem SISPAA.\nAnalisis bagi tahun 2024 menunjukkan sebanyak 16,493 aduan telah diterima di seluruh MBIP.\nDaripada jumlah tersebut, sebanyak 4,552 aduan (69.99%) di Jabatan Kejuruteraan mengambil masa melebihi 14 hari untuk diselesaikan.","impak":"Pelaksanaan reformasi ini menunjukkan peningkatan ketara dalam kecekapan penyelesaian aduan dan tahap kepuasan pelanggan MBIP.\nBerdasarkan data pemantauan dalaman suku pertama tahun 2025, jumlah aduan yang diselesaikan dalam tempoh 14 hari meningkat kepada 83% berbanding hanya 30% pada tahun sebelumnya.\nMasa keseluruhan penyelesaian purata berjaya dikurangkan daripada 182 hari kepada 14 hari, melebihi sasaran utama reformasi. MBIP juga berjaya mengurangkan aduan berulang melalui tindakan siasatan lebih tepat dan pelaporan digital.\nPelaksanaan penambahbaikan pengurusan aduan bukan sahaja memberi manfaat kepada organisasi, malah turut mengurangkan kos yang ditanggung oleh pengadu dan orang awam.\nPenjimatan ini meliputi pengurangan masa membuat aduan susulan, kos komunikasi, kos perjalanan ke kaunter, risiko kerosakan harta benda serta gangguan aktiviti harian. Dengan penyelesaian aduan yang lebih cepat, orang awam dapat menikmati perkhidmatan perbandaran yang lebih responsif, selamat dan menjimatkan.","pengiraan":"RM254,912.00\n(Pengurangan masa membuat aduan susulan, kos komunikasi, risiko kerosakan harta benda serta gangguan aktiviti harian)","rm":254912.0,"ahli":"Salwa Abd Rashid\nNurul Nabila Huda binti Mohd Johan\nMohamad Na
