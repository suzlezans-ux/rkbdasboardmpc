 City) berjaya dikawal melalui pelaksanaan mekanisme kontra tunggakan dengan aset pemaju (swap deal). Peningkatan hasil sebanyak RM97 juta.","pengiraan":"RM548,404 (Penjimatan kos pentadbiran MBIP)","rm":548404.0,"ahli":"Abdul Munir Arif bin Masri\nSr. Zatul Amri bin Zanal\nHajah Nur Huda binti Sanusi\nHajah Fadzilah binti Hj. A. Rahim\nHajah Fazliaton binti Mohd Noor\nYM. Tengku Aidda binti Tengku Abdullah\nTs. Siti Rafidah binti Arifin\nSiti Khadijah binti Md Lazim\nZahuri bin Tahar @ Omar","scores":{"K1":4,"K2":3,"K3":3,"K4":5,"K5":3,"K6":3,"K7":2},"nota":"K2 dihad 3: tiada data sebelum/selepas","xrank":0},{"id":"Negeri#12","bil":"12","kat":"Negeri","cy":false,"entiti":"NEGERI JOHOR","agensi":"MAJLIS BANDARAYA ISKANDAR PUTERI (MBIP)","tajuk":"Mempercepat Proses Penyempurnaan Dokumen Kontrak di Bandaraya Iskandar Puteri daripada 18 Bulan kepada 3 Bulan","penerima":"Kontraktor, Pembekal perkhidmatan","keterangan":"MBIP mengalami kelewatan ketara dalam penyempurnaan dokumen kontrak, melebihi piagam pelanggan 120 hari bekerja sebagaimana ditetapkan dalam Pekeliling Kerajaan 4.2. Analisis prestasi penyempurnaan dokumen kontrak dalam tempoh 2022–2024 menunjukkan hanya 26% kontrak disempurnakan dalam masa yang ditetapkan manakala 74% melebihi had masa, dengan tempoh median penyempurnaan 144 hari dan maksimum 217 hari.\nKelewatan ini berpunca daripada proses kerja yang tidak selaras antara jabatan, kesilapan draf kontrak, dan kelemahan dalam penyelarasan tandatangan pegawai utama seperti Datuk Bandar dan Setiausaha. Kesannya, proses tuntutan bayaran kontraktor tertangguh, mengakibatkan kelewatan projek, gangguan perbelanjaan tahunan dan aduan awam terhadap prestasi penyampaian perkhidmatan MBIP.","impak":"Reformasi yang dilaksanakan telah berjaya meningkatkan prestasi pengurusan kontrak MBIP secara signifikan seperti berikut;\nKadar penyempurnaan kontrak dalam 120 hari meningkat daripada 26% (2024) kepada 95% (2025);\nTempoh median penyempurnaan berkurang daripada 144 hari kepada 100 hari, penjimatan masa sebanyak 30.5%;\nKesalahan dalam penyediaan draf kontrak berkurang lebih 70%, khususnya dalam komponen Articles of Agreement dan Syarat Kontrak;\nPenyerahan Surat Setuju Terima (SST) oleh kontraktor meningkat kepada 90% dalam masa 14 hari berbanding hanya 60% sebelum ini; dan\nCarta alir kerja yang baharu berjaya memperkukuh amalan pematuhan prosedur secara konsisten merentasi semua jabatan.Kepuasan kontraktor meningkat kepada 88%, dan kelewatan bayaran selepas pelaksanaan menurun hampir 40%.","pengiraan":"RM2.99 Juta (penjimatan kos pentadbiran, susulan dokumen, perjalanan, cetakan dan pembetulan dokumen)","rm":2990000.0,"ahli":"Sr. Zuraine binti Mahmood\nTs. Rosaidi bin Ibrahim\nMohd Yuzairi bin Md Yasir\nMohd Norhalis bin Mohd Saat\nHuda Madihah binti Pirdaus\nZuriatie binti Mat Hussain\nAhmad Azraei bin Kamarulzaki\nMuhd Badrul Hisham bin Abd Rahman","scores":{"K1":3,"K2":5,"K3":4,"K4":2,"K5":5,"K6":3,"K7":3},"nota":"","xrank":0},{"id":"Negeri#13","bil":"13","kat":"Negeri","cy":true,"entiti":"WILAYAH PERSEKUTUAN","agensi":"DEWAN BANDARAYA KUALA LUMPUR (DBKL) ","tajuk":"Mempercepat Kelulusan Permohonan Permit Pembinaan di Kuala Lumpur daripada 42 Hari kepada 21 Hari","penerima":"Pemaju, Konsultan, Pemilik projek, Pelabur, Unit OSC DBKL (5,500 pemohon setahun), Agensi Teknikal Sahabat seperti JAS, JPS dan LLM, serta warga Kota Kuala Lumpur.","keterangan":"Projek ini bagi meningkatkan kecekapan projek kelulusan  permit pembinaan di Wilayah Persekutuan Kuala Lumpur (WPKL) serta pemantauan permohonan daripada Proses P2 sehingga P6.\nMenggantikan proses kerja secara manual bermula daripada pengemukaan permohonan cadangan pembangunan, pengagihan permohonan, pemprosesan permohonan, notifikasi memulakan kerja, pemeriksaan interim, pemeriksaan akhir I dan II dan pendepositan CCC.\nMeningkatkan capaian serta semakan maklumat permohonan cadangan pembangunan secara atas talian oleh pengguna sistem termasuk pemohon tanpa perlu berhubung dengan jabatan/agensi teknikal dalaman dan luaran DBKL berkenaan status dan keputusan.","impak":"Proses kelulusan yang cepat (secara atas talian) sehingga 50%, daripada 42 hari kepada 21 hari.\nKos pematuhan berkurang 66.65%, daripada RM232.65 juta kepada RM77.55 juta setahun.\nPenjimatan tahunan dianggarkan RM155.10 juta bagi 5,500 permohonan pembangunan.\nMasa kerja pemprosesan menurun 67%, daripada 6 jam kepada 2 jam setiap permohonan.\nMemudahkan pemantauan Cadangan Pembangunan sehingga pengeluaran pendepositan CCC.","pengiraan":"SEBELUM\nKos masa kerja 6 jam × RM50 = RM300\nKos peluang 42 hari × RM1,000 = RM42,000\nJumlah kos per permohonan RM300 + RM42,000 = RM42,300 x 5,500 = RM232,650,000\n\nSELEPAS\nKos masa kerja 2 jam × RM50 = RM100\nKos peluang 14 hari × RM1,000 = RM14,000\nJumlah kos per permohonan RM100 + RM14,000 = RM14,100 x 5,500 = RM77,550,000\n\nAnggaran jumlah penjimatan setahun = RM155,100,000\n(66.7%)\n\nn=5,500 (permohonan)","rm":155100000.0,"ahli":"Muhammad Azwal Ab Azis\nUmi Zurina Mohd Loky\nTPr. Shariman Abdul Wahab\nKamariah Kamarudin\nZeti Akhtar Salim\nNur Afiqah Mohamed Bakary\nAzahar Mansor","scores":{"K1":3,"K2":4,"K3":5,"K4":3,"K5":5,"K6":4,"K7":2},"nota":"","xrank":24},{"id":"Negeri#14","bil":"14","kat":"Negeri","cy":false,"entiti":"WILAYAH PERSEKUTUAN","agensi":"PERBADANAN PUTRAJAYA ","tajuk":"Meningkatkan Kecekapan Pengurusan Perolehan dan Kontrak di Perbadanan Putrajaya","penerima":"Peniaga/ syarikat, pembekal, kontraktor, komuniti","keterangan":"Pengurusan perolehan dan kontrak di Perbadanan Putrajaya (PPj) sebelum ini bergantung kepada proses manual, penggunaan fail fizikal, serta ketiadaan sistem penjejakan masa nyata yang menyebabkan kelulusan tender lazimnya melebihi 30 hari bekerja.\nKeadaan tersebut mengakibatkan risiko kehilangan dokumen yang tinggi, ketidakseragaman format, serta kelewatan pelantikan vendor dan proses pembayaran yang menjejaskan imej ketelusan organisasi.\nBagi menangani isu ini, PPj melaksanakan reformasi digital melalui pembangunan dashboard pemantauan kitaran perolehan bersepadu dan penyeragaman templat dokumen digital dengan ciri jejak audit automatik.\nInisiatif ini berjaya memendekkan tempoh kelulusan kontrak kepada 14 hari, mengurangkan kos pematuhan sebanyak 66.7% (penjimatan RM1.32 juta), serta mempertingkatkan produktiviti pegawai dan keyakinan vendor terhadap penyampaian perkhidmatan kerajaan.","impak":"Pengurangan Masa: Tempoh kelulusan kontrak dipendekkan daripada 30 hari kepada maksimum 14 hari bekerja.\nPenjimatan Kos: Kos pematuhan tahunan berkurang sebanyak 66.7%, iaitu penjimatan sebanyak RM1.32 juta.\nDigitalisasi: Kebergantungan kepada fail fizikal menurun sekurang-kurangnya 60% melalui penggunaan sistem pemfailan digital.\nIntegriti: Proses menjadi lebih mudah diaudit dan telus melalui capaian digital serta jejak audit automatik.","pengiraan":"Kos percetakan (borang permohonan dan dokumen sokongan) = RM85,000.00 setahun\nKos operasi harian (pengurangan kakitangan untuk penjualan sebutharga dan tender secara manual) = RM20,000.\nKos ketirisan (leakage cost) pada nilai tender (penjualan secara dalam talian) = RM 500,000.00 kerana\n\nAnggaran keseluruhan penjimatan setahun =  RM605,000.00","rm":605000.0,"ahli":"Mohd Musabri bin Shaharom\nSyalinda binti Abu Hasan Al Shaari\nMohd Shah Ridzuan bin Maarip\nAman Shah bin Abdul Satar\nAhmad Faizal bin Abu Bakar","scores":{"K1":3,"K2":5,"K3":3,"K4":4,"K5":5,"K6":5,"K7":2},"nota":"","xrank":0},{"id":"Negeri#15","bil":"15","kat":"Negeri","cy":false,"entiti":"WILAYAH PERSEKUTUAN","agensi":"PERBADANAN PUTRAJAYA ","tajuk":"Mempercepat Kelulusan Lesen Penjaja Sementara di Putrajaya daripada 1 Hari kepada 10 Minit","penerima":"Penjaja, Pembekal, Komuniti, PBT (PPj)","keterangan":"Proses permohonan Lesen Penjaja Sementara (LPS) bagi acara atau program di Putrajaya sebelum ini dilaksanakan secara manual melalui penghantaran fizikal atau e-mel yang memerlukan penyediaan surat manual oleh pegawai.\nKaedah ini menyebabkan kitaran semakan menjadi panjang dengan masa pemprosesan terkumpul sehingga lima hari bekerja, selain berisiko tinggi terhadap ralat komunikasi dan kegagalan penghantaran lampiran dokumen.\nBagi mengatasi kerenah birokrasi tersebut, PPj telah mendigitalkan sepenuhnya aliran kerja permohonan melalui sistem dalam talian dan penyeragaman prosedur operasi standard (SOP) baharu.\nInisiatif ini berjaya memendekkan tempoh kelulusan daripada lima hari kepada hanya satu hari bekerja, sekali gus meningkatkan ketelusan status permohonan dan memberikan pengalaman pengguna yang lebih baik kepada penganjur acara.","impak":"Permohonan secara dalam talian sepenuhnya sehingga kepada pengeluaran lesen (end to end)\nKelulusan diterima secara terus selepas permohonan dihantar.\nTempoh kelulusan dipercepat 99.7%, daripada 1 hari kepada 10 minit.\nPermohonan diproses 100% secara dalam talian hingga pengeluaran lesen.\nPenjimatan kos pematuhan RM327,600 setahun, bersamaan 90%.\nMemberi manfaat kepada 12,000 permohonan setahun melibatkan penganjur, pembekal komuniti dan PPj.","pengiraan":"Sebelum\nKos pengangkutan (submit dan collect) RM100/trip x 2 X 1,200\n•  Kos peluang RM RM100 X 1 hari x 1,200\n.Kos penyediaan dokumen RM3 x 1,200 permohonan\nJumlah = RM363,600\n\nSelepas\nKos pengangkutan - nil\nKos peluang – nil\nKos penyediaan dokumen – nil\nLain-lain kos (Internet, utilitii) RM3 x 1200\nJumlah = RM36,000\n\nAnggaran jumlah penjimatan setahun = RM327,600\nBersamaan 90%\n\nn=12,000 permohonan","rm":327600.0,"ahli":"Mohd Musabri bin Shaharom\nZabibah binti Samat\nHaszanoraisyah binti Hashim\nMd Faishal bin Kabun\nRozimah binti Wahid\nAida Royani binti Jamal","scores":{"K1":3,"K2":5,"K3":3,"K4":3,"K5":5,"K6":4,"K7":3},"nota":"","xrank":0},{"id":"Negeri#16","bil":"16","kat":"Negeri","cy":false,"entiti":"WILAYAH PERSEKUTUAN","agensi":"PERBADANAN PUTRAJAYA ","tajuk":"Meningkatkan Kecekapan Pengurusan Kebersihan Tandas Awam di Putrajaya","penerima":"Orang awam, pengguna tandas awam, kakitangan audit PPj dan pasukan penyelenggaraan","keterangan":"Pengurusan audit dan pemantauan kebersihan tandas awam di Putrajaya sebelum ini dilakukan secara manual menggunakan borang fizikal yang perlu disalin semula ke dalam rekod elektronik.\nProses manual tersebut mengambil masa antara 3 – 5 hari untuk melengkapkan pelaporan, yang mengakibatkan kelewatan dalam mengesan isu kebersihan serta meningkatkan kos pentadbiran dan risiko ralat input data.\nSebagai langkah penyelesaian, PPj memperkenalkan Sistem EREST (System for Rating, Evaluating and Sanitary Management of Toilets) untuk mendigitalkan pengauditan masa nyata, pemarkahan standard, serta pengurusan aduan secara bersepadu.\nPelaksanaan sistem ini telah memendekkan kitaran audit kepada satu hari sahaja, mempercepatkan tindakan pembaikan dalam tempoh tiga hari, serta memperkukuh imej Putrajaya sebagai bandar pintar melalui standard kebersihan yang konsisten.","impak":"Tempoh audit dipendekkan daripada 3–5 hari kepada 1 hari sahaja.\nPenjimatan kos pematuhan dianggarkan RM12,600 setahun, bersamaan 55%.\nPelaporan audit dijana automatik, mengurangkan input manual dan risiko ralat data.\nAduan dan keperluan penyelenggaraan disalur lebih sistematik kepada pihak bertanggungjawab.","pengiraan":"Kos sumber manusia (kerja lebih masa) RM300 X 20 orang X 2 kali audit = RM12,000.00\n\nKos cetakan dokumen (borang audit) RM0.30 X 1000 helai X 2 kali audit = RM600.00\n\nAnggaran jumlah penjimatan setahun = RM12,600.00\n\nAnggaran penjimatan =55%","rm":12600.0,"ahli":"Mohd Musabri bin Shaharom\nDr. Mohd Helmi bin Abdul Hamid\nSyalinda binti Abu Hasan Al Shaari\nRosmaidi bin Rimin\nNurul Afiqa Adila binti Zakaria\nMastura binti Mat Isa","scores":{"K1":3,"K2":5,"K3":2,"K4":3,"K5":5,"K6":4,"K7":3},"nota":"","xrank":0},{"id":"Negeri#17","bil":"17","kat":"Negeri","cy":true,"entiti":"WILAYAH PERSEKUTUAN","agensi":"MAJLIS AGAMA ISLAM WILAYAH PERSEKUTUAN","tajuk":"Meningkatkan Kecekapan Pengurusan Pembayaran kepada Pembekal Perkhidmatan Bantuan Skim Dialisis dan OKU","penerima":"Pembekal perkhidmatan rawatan dialisis dan terapi OKU, serta asnaf penerima bantuan MAIWP.","keterangan":"Bantuan Perubatan merupakan salah satu kluster bantuan yang diwujudkan oleh MAIWP bertujuan membantu golongan asnaf yang memerlukan rawatan kesihatan dan perubatan.\nTerdapat 4 skim bantuan di bawah kluster perubatan iaitu Skim Bantuan Perubatan Am, Skim Bantuan Peralatan Kesihatan, Skim Bantuan Dialisis dan Skim Bantuan Orang Kelainan Upaya (OKU).\nBantuan ini bagi memastikan asnaf yang tidak berkemampuan mempunyai akses kepada rawatan yang sewajarnya sama ada di hospital kerajaan, separa kerajaan atau farmasi, agar mereka tidak terpinggir daripada mendapatkan perkhidmatan kesihatan yang berkualiti.","impak":"Proses pembayaran yang seragam dan cepat yang dapat meningkatkan ketelusan dan integriti kewangan\nProses pembayaran digital sepenuhnya untuk Pusat Rawatan Dialisis & Pusat Terapi OKU\nMemastikan rekod audit lengkap meliputi semakan, kehadiran, rawatan, kelulusan, dan transaksi.\nAsnaf mendapatkan rawatan dengan lebih cepat dan mengikut jadual ditetapkan sekaligus meningkatkan kesejahteraan hidup dan kesihatan asnaf\nPenjimatan keseluruhan dianggarkan RM1.6 juta, bersamaan 90% kos pematuhan.\nKos peluang asnaf berkurang RM1.12 juta melalui rawatan lebih cepat mengikut jadual.\nKos MAIWP turun RM277,236.21 dan kos pengurusan pusat rawatan jimat RM203,080.82.","pengiraan":"Penjimatan kos pengurusan pusat rawatan = RM203,080.82\nPenjimatan kos rawatan oleh Asnaf (Kos Peluang) = RM1.12 juta\nPenjimatan kos MAIWP = RM277,236.21\nJumlah Penjimatan keseluruhan = RM1.6 juta\n\nAnggaran penjimatan =90%","rm":1600000.0,"ahli":"Abdul Rauf bin Abd Aziz\nKhairunnisak binti Ismail\nMuhammad Noorfirdaus bin Abu Bakar","scores":{"K1":3,"K2":3,"K3":4,"K4":4,"K5":3,"K6":3,"K7":2},"nota":"K2 dihad 3: tiada data sebelum/selepas","xrank":5},{"id":"Negeri#18","bil":"18","kat":"Negeri","cy":true,"entiti":"NEGERI TERENGGANU","agensi":"UNIT PERANCANG EKONOMI NEGERI TERENGGANU ","tajuk":"Mempercepat Proses Kelulusan Pemberimilikan Tanah Industri Kepada PMINT daripada 12 Bulan Kepada 3 Bulan","penerima":"Pelabur, syarikat industry, pemaju","keterangan":"Proses pemberimilikan tanah industri terlalu lama (6–18 bulan) menyebabkan pelabur hilang minat, PMINT rugi RM1.5 juta, dan negeri terlepas peluang pelaburan besar.\nMasalah utama berpunca daripada proses manual, semakan berulang, pelbagai peringkat kelulusan\nRKB bertujuan mempercepatkan proses daripada 12 bulan kepada maksimum 3 bulan melalui pembaikan proses dan digitalisasi.\nPenyelesaian utama termasuk:\nPemindaan proses PMINT supaya permohonan lengkap lebih awal.\nKelulusan blanket bagi lot industri  di dalam Kawasan industri.\nPenggunaan penuh Sistem E-Tanah untuk pemantauan masa nyata.\nProses baharu lebih ringkas, digital dan terselaras antara agensi, membolehkan geran sementara diperoleh lebih cepat.","impak":"Notis 5A siap dalam 44 hari – proses pemberimilikan tanah dipercepatkan sehingga maksimum 3 bulan.\nKeyakinan pelabur meningkat melalui proses yang lebih cekap, telus dan mesra pelabur.\nPelaburan & kerja infrastruktur dapat dimulakan awal, termasuk pembinaan tapak, utiliti dan kemudahan sokongan.\nPendapatan kerajaan diterima lebih awal melalui premium tanah, cukai tanah dan hasil berkaitan.\nPengisian kawasan industri meningkat, mengurangkan lot terbiar dan mempercepat pembangunan zon industri.\nKurang risiko pelabur menarik diri, memastikan PMINT dan negeri tidak kehilangan peluang pelaburan bernilai tinggi.\nMeningkatkan daya saing pelaburan Terengganu, menjadikan negeri lebih menarik kepada pelabur tempatan dan asing.","pengiraan":"Penjimatan Kos Luar selepas RKB\nKos Overhead Pelabur (Operasi):\nRM 27,000,000.00\nii. Kos Overhead Pelabur (Projek):\nRM 198,000,000.00\niii. Kos Pentadbiran: RM 250,000.00\niv. Kos Business Engagement:\nRM 50,000.00\n\nKeseluruhan: RM 225,750,000.00\n\nPenjimatan Kos Dalam selepas RKB\nKos Doku an":"Pengurusan kutipan cukai taksiran Majlis Bandaraya Subang Jaya (MBSJ) bergantung kepada prosedur manual dan fizikal. Data pelanggan tidak lengkap serta format tidak seragam menyukarkan semakan, kemas kini dan penyampaian maklumat kepada pemilik harta.\nNotifikasi melalui bil bercetak dan pos menelan kos tinggi dan memakan masa, manakala padanan nombor telefon dengan IRMS tidak sistematik menyebabkan notis gagal sampai kepada penerima yang tepat.\nProses kerja melibatkan sehingga 32 langkah, mengambil masa sekitar 80 jam dan memerlukan enam (6) orang kakitangan. Kos operasi tahunan turut dibebani oleh emolumen, cetakan dan pos, sekali gus merencatkan kecekapan, ketepatan komunikasi dan kepuasan pelanggan.\nMelalui sistem i‑Data sebagai platform digital bersepadu berjaya menyimpan, menapis, membersih dan mengemas kini data pelanggan secara automatik dan selamat, dan menurunkan masa proses kerja daripada 80 jam (32 langkah) kepada 7 jam 30 minit (11 langkah), dengan pengurangan kebergantungan tenaga kerja daripada enam (6) orang kepada seorang (1) serta peningkatan kutipan hasil dan ketepatan data pelanggan.","impak":"Meningkatkan kecekapan pengurusan cukai taksiran sebanyak 90% iaitu daripada 80 jam kepada 7 jam 30 minit.\nMeningkatkan kutipan hasil cukai sebanyak 3% iaitu RM3.9 juta.\nMengurangkan tenaga kerja daripada 6 orang kepada 1 orang.","pengiraan":"Penjimatan kos operasi sebanyak 83% iaitu RM1,440,000\nAnggaran penjimatan kos peluang RM3,900,000\nJumlah penjimatan keseluruhan RM5,340,000 setahun","rm":5340000.0,"ahli":"Norhasrin binti Abdullah\nMuhammad Mahfuz bin Mohd Yusop\nShawal Rulrizal bin Muhamad\nSiti Rahmah binti Md Dali\nSiti Naszra Nur binti Mohd Fadhil\nMuhammd Safwan bin Abd Wahab\nMohd Faizul bin Jamaludin","scores":{"K1":3,"K2":5,"K3":4,"K4":4,"K5":5,"K6":4,"K7":2},"nota":"","xrank":0},{"id":"Negeri#71","bil":"71","kat":"Negeri","cy":true,"entiti":"NEGERI SELANGOR","agensi":"MAJLIS PERBANDARAN AMPANG JAYA (MPAJ)","tajuk":"Mempercepat Proses Kelulusan Pelan Pemajuan untuk Pembangunan Berimpak Tinggi dalam Kawasan Pentadbiran Majlis Perbandaran Ampang Jaya daripada 99 Hari kepada 14 Hari","penerima":"Industri\nPrinciple Submitting Person (PSP)\nKomuniti setempat","keterangan":"Proses kelulusan pelan di Majlis Perbandaran Ampang Jaya (MPAJ) walaupun dilaksanakan secara serentak masih mengambil masa yang panjang, khususnya bagi projek berimpak tinggi.\nKekurangan mekanisme penyelarasan menyeluruh dan amalan pemantauan prestasi yang konsisten menjejaskan akauntabiliti, seterusnya menurunkan kepuasan pelanggan dan keyakinan pelabur terhadap prospek pembangunan di kawasan MPAJ.\nMelalui penyelarasan awal bersama agensi dan jabatan teknikal, mesyuarat pra rundingan teknikal, penambahbaikan penggunaan sistem OSC Online berjaya mengurangkan bilangan kitaran ulasan, menyelaraskan penyelesaian isu segera sepanjang pembinaan dan mewujudkan akauntabiliti jelas bagi semua pihak terlibat, sekali gus meningkatkan kecekapan proses kelulusan dan mempercepat pelaksanaan projek.","impak":"Mempercepatkan kelulusan pelan pembangunan daripada 99 hari kepada hanya 14 hari, iaitu pengurangan masa sebanyak 85 hari bagi projek berimpak tinggi (85.86%).\n\nMengelakkan kos peluang bernilai RM9.246 juta melalui percepatan pelaksanaan projek, dengan potensi manfaat ekonomi kasar sehingga RM18.492 juta.\n\nMerangsang pertumbuhan ekonomi setempat dengan memacu pembangunan infrastruktur dan perniagaan baharu, meningkatkan rantaian bekalan serta aktiviti ekonomi komuniti sekitar kawasan projek.\n\nMewujudkan peluang pekerjaan baharu melalui pelaksanaan projek berskala besar yang dijangka membuka ribuan peluang kerja langsung dan tidak langsung untuk penduduk tempatan.","pengiraan":"Penjimatan kos pematuhan RM9,246,000","rm":9246000.0,"ahli":"TPr. Zuraina binti Said\nIr. Ts. Haji Zafrul Fazry bin Mohd Fauzi\nAhmad Alhairi bin Mohamed Yusuf\nNorhayati binti Abu Bakar\nMuhammad Harith bin Ismail","scores":{"K1":5,"K2":3,"K3":4,"K4":3,"K5":3,"K6":5,"K7":2},"nota":"K2 dihad 3: tiada data sebelum/selepas","xrank":38},{"id":"Negeri#72","bil":"72","kat":"Negeri","cy":false,"entiti":"NEGERI SELANGOR","agensi":"MAJLIS PERBANDARAN KAJANG (MPKJ)","tajuk":"Meningkatkan Kecekapan Pengurusan Bantahan Cukai Taksiran daripada 66 Hari kepada 4 Hari","penerima":"Pemilik harta / pembayar cukai taksiran\nRakyat / komuniti setempat","keterangan":"Proses bantahan cukai taksiran MPKj dilakukan secara manual melibatkan 14 langkah, mengambil masa sehingga 66 hari, memerlukan kehadiran fizikal dan menyebabkan kos serta kelewatan kepada pemilik harta.\nSistem e-Bantah@Cukai diperkenalkan menggunakan platform digital (Google Form/Sheet/Meet & QR) dengan SOP baharu 10 langkah dan penghantaran dokumen serta mesyuarat secara dalam talian.\nTempoh proses dipendekkan sebanyak 93.94% dari 66 hari kepada 4 hari dengan penjimatan kos pentadbiran dan peningkatan kecekapan serta kepuasan pelanggan.","impak":"Penjimatan kos perjalanan pemilik harta yang membantah sebanyak RM11,200.00 setahun.\nPenjimatan kos kertas dan setem bagi pemilik harta yang membantah sebanyak RM560.00 setahun.\nPenjimatan kos pentadbiran jabatan melibatkan kertas dan setem sebanyak RM2,480.64 setahun.\nPenjimatan Kos Emolumen 2 Orang Kakitangan sebanyak RM50,808.00 setahun.\nProses memberi maklumbalas permohonan bantahan dikurangkan daripada 22 hari kepada 1 hari bekerja.\nMasa penyediaan surat permohonan bantahan oleh pemilik harta dikurangkan daripada 12 jam kepada hanya 10 minit.\nPenyediaan jadual bantahan dikurangkan daripada 44 hari kepada 3 hari.\nProses keseluruhan pengurusan bantahan dikurangkan daripada 14 kepada 10 langkah, iaitu pengurangan sebanyak 28.57%.\nMeningkatkan kepuasan pelanggan 70%.","pengiraan":"Kos pematuhan RM11,760 setahun\nKos penjimatan operasi RM53,848.64 setahun\nAnggaran penjimatan kos peluang RM694,400\nJumlah penjimatan keseluruhan RM760,008.64 setahun","rm":760008.64,"ahli":"Mohamad Razali bin Kamaruddin\nNursyaza Fazreen bin :332813.33,"ahli":"Nur Suhada binti Bakri\nMimi Azrina binti Musolli\nNorziati binti Ismail\nDahya Qalbi binti Yusof Rajoo\nMohd Marzuki bin Mohd Mansor\nMohd Haziq bin Mohd Misjudi\nMohd Muhibuddin bin Mohd Nuri","scores":{"K1":3,"K2":5,"K3":3,"K4":3,"K5":5,"K6":4,"K7":3},"nota":"","xrank":0},{"id":"Negeri#74","bil":"74","kat":"Negeri","cy":true,"entiti":"NEGERI SELANGOR","agensi":"MAJLIS BANDARAYA DIRAJA KLANG (MBDK)","tajuk":"Mempercepat Kelulusan Kebenaran Merancang Skim Industri dan Pembangunan Tanpa Kebenaran di Daerah Klang daripada 57 Hari kepada 14 Hari","penerima":"Pelabur industri / pemilik kilang\nPemaju / pemilik tanah / pemilik premis industri\nPrincipal Submitting Person (PSP)\nPenduduk / Komuniti setempat","keterangan":"Kelulusan Kebenaran Merancang (KM) MBDK mengambil 57 hari kerana bergantung pada 12 agensi teknikal, proses manual, dokumen berulang dan tiada sistem digital serta Service Level Agreement  (SLA) menjejaskan keyakinan pelabur.\nMelalui inisiatif sistem digital “Klang Fast Track Industry”, kelulusan KM dipercepatkan bagi kawasan skim industri dan pemutihan kilang tanpa kebenaran tanpa perlu ulasan 12 agensi teknikal sekiranya pelan induk telah diluluskan.\nPendekatan ini melibatkan penstrukturan semula prosedur kerja, penggunaan sistem ArcGIS untuk pemantauan digital serta penyediaan Manual Pelan Pembangunan Industri bagi ketelusan proses.","impak":"Meningkatkan permohonan yang diluluskan daripada 19 kepada 199 dalam tempoh 6 bulan.\nPeningkatan hasil MBDK dari RM83 juta kepada RM94 juta.\nMengurangkan tenaga kerja teknikal daripada 6 orang kepada 1 orang pegawai.\nMeningkatkan ketelusan, mengurangkan pelaburan tanpa kebenaran dan memperkukuh imej MBDK sebagai PBT digital pintar yang berkecekapan tinggi dan berdaya saing.","pengiraan":"Penjimatan kos operasi RM100,000 setahun\nAnggaran penjimatan kos peluang RM11,000,000 setahun\nJumlah penjimatan keseluruhan RM11,100,000 setahun","rm":11100000.0,"ahli":"TPr. Hajjah Yusrina binti Mohama rkan sehingga Mac 2026 dan RM32.6 Billion dicatatkan bagi Foreign Direct Investment & Domestic Direct Investment\nMembuka lebih 8,000 peluang pekerjaan.\nKelulusan pengeluaran dokumen utama C1 (Kebenaran Merancang) dan DO(Perintah Pembangunan) lebih cepat iaitu dalam tempoh 73 hari.\nKerja pembinaan dapat dilaksanakan lebih awal dan cepat.\nProjek pembinaan disiapkan dalam tempoh 13-15 bulan.\nRM44.84 Juta jumlah Fi Proses Permohonan, Caj Pemajuan DLL direkodkan.\nRM22.1 Juta anggaran jumlah Cukai Taksiran direkodkan.","pengiraan":"Penjimatan Kos Pengurusan & Pentadbiran sebanyak RM31,500,000.00\n\nPenjimatan Kos Faedah/Kewangan sebanyak RM56,701,383.58\n\nPenjimatan Kos Pematuhan Tahunan(1 Projek) sebanyak RM88,201,383.50\n\n​Jumlah Penjimatan Kos Tahunan(8 Projek SPEED yang diluluskan) sebanyak RM705,611,068.00","rm":705611068.0,"ahli":"YBhg. Dato’ Haji Baderul Amin bin Abdul Hamid\nTPr. Any Nuhairah binti Abdul Razak\nAnis Zulfa binti Johari\nMohammad Aidil Afiq bin Nazarudin\nMohd Suhadi bin Samsuddin\nMalrohafiz bin Abd Razak","scores":{"K1":5,"K2":4,"K3":5,"K4":3,"K5":5,"K6":4,"K7":2},"nota":"","xrank":30},{"id":"Negeri#76","bil":"76","kat":"Negeri","cy":false,"entiti":"NEGERI PULAU PINANG","agensi":"PEJABAT TANAH & GALIAN PULAU PINANG dan PEJABAT DAERAH & TANAH PULAU PINANG","tajuk":"Mempercepat Kelulusan Pembaharuan Semula Lesen Pendudukan Sementara (LPS) daripada 254 Hari kepada 74 Hari","penerima":"Peniaga\nIndustri\nOrang Awam\nPetani\n\nAnggaran sebanyak 835 penerima manfaat daripada 835 permohonan LPS pada tahun 2022 – 2024.","keterangan":"Sebanyak 835 permohonan Lesen Pendudukan Sementara (LPS) telah dipertimbangkan oleh Mesyuarat Jawatankuasa Tanah Negeri  (MJKTN) Pulau Pinang dari tahun 2022 hingga 2024.\nMengikut piagam pelanggan, tempoh proses ditetapkan 142 hari bekerja, namun kajian PTG ke atas 30 sampel mendapati purata sebenar ialah 254 hari bekerja.\nBagi mengatasi kelewatan ini, MMK Bil. 34/2024 pada 18.12.2024 telah meluluskan penurunan kuasa kepada Pentadbir Tanah untuk melulus atau menolak permohonan LPS.","impak":"Permohonan LPS (selain tanah rizab & rayuan) tidak perlu dibawa ke MJKTN, PTG dan PDT berjaya mengurangkan bilangan permohonan sebanyak 70%, sekaligus membolehkan tumpuan diberikan kepada permohonan tanah yang kompleks dan berimpak tinggi.\nPengurangan masa pengurusan permohonan sebanyak 71% meningkatkan produktiviti pegawai dan mengurangkan kelewatan penyampaian perkhidmatan.\nPenjimatan kos pematuhan kepada pemohon sebanyak 62.2% dan penjimatan kos pengurusan PTG dan PDT sebanyak 71%.","pengiraan":"Penjimatan Kos Pematuhan Tahunan sebanyak RM1,017,600.00 (Kediaman) & RM3,000,000.00 (Pertanian)\n\n​Penjimatan Kos Pengurusan kepada Jabatan sebanyak RM1,925,172.00\n\nJumlah Penjimatan Kos Tahunan sebanyak RM5,942,772.00","rm":5942772.0,"ahli":"YBhg. Dato’ Dr. Faizal bin Kamarudin\nYBhg. Dato’ Rosli bin Halim\nYBhg. Dato’ Kamarul Haizal bin Koderat\nMohd Lokman Hakim bin Syed Sultan\nFaradila Teh binti Razali\nIsmasuhaimi bin Shariff\nMohd Hafiz Aswad bin Nadzri\nKhairulnizam bin Hashim","scores":{"K1":3,"K2":3,"K3":4,"K4":3,"K5":3,"K6":5,"K7":2},"nota":"K2 dihad 3: tiada data sebelum/selepas","xrank":0},{"id":"Negeri#77","bil":"77","kat":"Negeri","cy":false,"entiti":"NEGERI PULAU PINANG","agensi":"PEJABAT TANAH & GALIAN PULAU PINANG","tajuk":"Mempercepat Kelulusan Permohonan Pindahmilik, Pajakan, Pajakan Kecil, Tenansi dan Cagaran Kebenaran Pihak Berkuasa Negeri bagi Cagaran di bawah RM50 Juta untuk Semua Kategori Tanah dengan Mengurangkan Tempoh Kelulusan daripada 49 Hari kepada 14 Hari.","penerima":"Pemilik Hartanah\n67 Penerima Manfaat daripada 67 permohonan.","keterangan":"Pihak Berkuasa Negeri (PBN) melalui Warta Kerajaan Negeri Pulau Pinang No. 726 bertarikh 7 Julai 2022 telah meluluskan perwakilan kuasa untuk melulus dan menolak permohonan kebenaran untuk pindahmilik, pajakan, pajakan kecil, tenansi dan cagaran (tertakluk kepada syarat dan sekatan dan had siling yang ditetapkan) bagi egitu, kes seperti ini masih perlu didaftarkan dan melalui prosedur mahkamah yang sama seperti kes lain.\nSecara umumnya, kes persetujuan bersama sepatutnya mudah dan tidak rumit. Namun, mengikut prosedur sedia ada, penyelesaian kes ini mengambil masa sehingga 71 hari dan memerlukan pihak-pihak hadir ke mahkamah sebanyak lima kali sebelum perintah persetujuan dapat dikeluarkan.\nPenambahbaikan telah dibuat bagi projek ini adalah dengan mengasingkan kes persetujuan bersama, penyusunan semula SOP dan  aliran kerja, pelaksanaan 'one day settlement'', pengurangan kehadiran pelanggan ke mahkamah dan standardisasi SOP seluruh Negeri.","impak":"Pelanggan, termasuk peguam dan orang awam, hanya perlu hadir sekali (1) sahaja ke mahkamah, berbanding lima (5) kali sebelum pelaksanaan RKB.\nJumlah kes tertunggak berkurang daripada 5,932 kes kepada 4,952 kes, iaitu pengurangan sebanyak 17%..\nPengurangan ini membolehkan mahkamah mempercepatkan penyelesaian kes-kes lain, kerana beban kerja menurun, jadual pendengaran menjadi lebih teratur, dan pegawai dapat memberi tumpuan yang lebih baik kepada kes yang memerlukan perhatian segera.","pengiraan":"Penjimatan Kos Pematuhan Tahunan sebanyak RM784,000.00\n\n​Penjimatan Kos Pengurusan kepada Jabatan sebanyak RM784,000.00\n\n​Penjimatan Kos Peluang Rakyat sebanyak RM784,000.00\n\n​Jumlah Penjimatan Kos Tahunan sebanyak RM2,881,200.00","rm":2881200.0,"ahli":"YBhg. Dato’ Za’im bin Md Yudin\nAsrul Nizam bin Yahya\nNik Suhaimi bin Nik Saberi\nHamizah binti Hamid","scores":{"K1":3,"K2":5,"K3":4,"K4":3,"K5":5,"K6":5,"K7":3},"nota":"","xrank":22},{"id":"Negeri#79","bil":"79","kat":"Negeri","cy":false,"entiti":"NEGERI PULAU PINANG","agensi":"PERBADANAN BUKIT BENDERA PULAU PINANG","tajuk":"Meningkatkan Kecekapan Pengurusan Giliran Menaiki Funikular di Stesen Bukit Bendera daripada 120 Minit kepada 30 Minit","penerima":"Pelancong/Rakyat\nPeniaga Sekitar Bukit Bendera\nAnggaran seramai 138,459 orang pelancong/pengunjung telah menerima manfaat dari tuan dapat disegerakan kepada mangsa\nPemerkasaan Jawatankuasa Pengurusan Bencana Daerah (JPBD) dalam kelulusan bantuan ≤ RM5,000 menjimatkan masa dan mengurangkan kebergantungan peringkat negeri.\nPenurunan beban pentadbiran di Pejabat Tanah dan Daerah (PDT) melalui pemakaian Borang 1A dan 1B yang lebih tersusun dan seragam.\nTempoh kelulusan dipendekkan dan bayaran bantuan kepada mangsa disegerakan.","pengiraan":"Penjimatan Kos Pematuhan Tahunan  Pemohon sebanyak RM41,480.00\n\n​Penjimatan Kos Peluang kepada Rakyat sebanyak RM10,880.00\n\nPenjimatan Kos Masa Operasi kepada Jabatan sebanyak RM627,000.00\n\n​Jumlah Penjimatan Kos Tahunan sebanyak RM579,360.00","rm":579360.0,"ahli":"Ambika Devi a/p Daran\nFadzila Maziya binti Abdul Gaffor\nSugaanthi a/p Shanmugam\nNur Amirah binti Baharudin\nPriyasine a/p Muneesvaran\nMazidah Fazlina binti Mohamed Murathu Khan\nShamin bin Isa","scores":{"K1":4,"K2":3,"K3":3,"K4":2,"K5":3,"K6":4,"K7":3},"nota":"K2 dihad 3: tiada data sebelum/selepas","xrank":0},{"id":"Negeri#90","bil":"90","kat":"Negeri","cy":false,"entiti":"NEGERI PULAU PINANG","agensi":"PEJABAT TANAH & GALIAN PULAU PINANG","tajuk":"Meningkatkan Kecekapan Proses Permohonan Kebenaran Menggunakan Tanah Rizab di Pulau Pinang","penerima":"Pemohon (Majlis Pembangunan Komuniti Kampung)\nAgensi Kerajaan\nAnggaran 23 penerima manfaat untuk projek ini.","keterangan":"Permohonan di atas tanah rizab dibenarkan melalui Pajakan Tanah Rizab, Lesen Pendudukan Sementara, Pemindahan Bahan Batuan dan Permit Bagi Ruang Udara.\nHasil pemerhatian PTG Pulau Pinang mendapati 2 isu yang dihadapi oleh Pejabat Daerah dan Tanah (PDT) semasa mempertimbangkan permohonan tanah rizab iaitu:\nKaedah yang dipilih oleh setiap PDT Adalah berbeza-beza semasa mempertimbangkan permohonan Tanah Rizab.\nTerdapat permohonan daripada Majlis Pembangunan Komuniti Kampung (MPKK), Kawasan Rukun Tetangga (KRT), Persatuan Penduduk dan Agensi Kerajaan untuk menggunakan tanah rizab ini namun tidak dapat dipertimbangkan kerana permohonan tidak memenuhi syarat-syarat di bawah seksyen 43 Kanun Tanah Negara.\nBagi menyelesaikan isu-isu ini, Pihak Berkuasa Negeri melalui Mesyuarat Majlis Kerajaan (MMK) Bil. 25/2024 bertarikh 4.9.2024 dan disahkan pada 11.9.2024 telah meluluskan garis panduan permohonan bagi tanah rizab yang diwartakan di bawah Seksyen 62, Kanun Tanah Negara.","impak":"Peningkatan kutipan hasil bukan cukai kepada Kerajaan Negeri sebanyak 98.4% (tertakluk kepada jenis kaedah yang dipilih untuk memproses permohonan)\nPenjimatan kos sebanyak 86.1% kepada MPKK dan agensi Kerajaan.\nMPKK dan agensi Kerajaan boleh mengemukakan permohonan kebenaran khas mengguna tanah rizab sekaligus membolehkan masyarakat setempat mendapat manfaat daripada aktiviti yang disediakan oleh MPKK dan agensi Kerajaan.\nPeningkatan hasil kepada Kerajaan Negeri RM6,126,510.00","pengiraan":"Penjimatan kepada pemohon sebanyak RM21,100.00","rm":21100.0,"ahli":"YBhg. Dato’ Dr. Faizal bin Kamarudin\nMohd Lokman Hakim bin Syed Sultan\nFaradila Teh binti Razali\nIntan Syamimi binti Abdul Halim\nSamirah binti Abu Bakar","scores":{"K1":3,"K2":3,"K3":2,"K4":4,"K5":3,"K6":5,"K7":2},"nota":"K2 dihad 3: tiada data sebelum/selepas","xrank":0},{"id":"Negeri#91","bil":"91","kat":"Negeri","cy":false,"entiti":"NEGERI PULAU PINANG","agensi":"JABATAN KESIHATAN NEGERI PULAU PINANG","tajuk":"Pengoptimuman Protokol Kawalan Wabak HFMD: Mengurangkan Kerenah Birokrasi Melalui Penilaian Risiko Dinamik dan Libat Urus Strategik di Pulau Pinang.","penerima":"Pengusaha Tadika/Taska/Tabika/Pra-Sekolah\nIbu bapa, Penjaga dan Kanak-Kanak\nAnggaran 56 orang pelajar dan ibu bapa menerima manfaat daripada projek ini.","keterangan":"Projek Reformasi Kerenah Birokrasi (RKB) bagi pengoptimuman protokol kawalan wabak HFMD di Pulau Pinang dilaksanakan bagi menangani beban kewangan, operasi, dan logistik akibat pendekatan penutupan premis secara menyeluruh yang sebelum ini bersifat tegar dan tidak mengambil kira variasi risiko.\nMelalui aduan pengusaha premis dan analisis menyeluruh, JKNPP memperkenalkan pendekatan dinamik berasaskan penilaian risiko termasuk penutupan bersasar, penggunaan Helaian Penilaian Risiko Kendiri, serta dialog berkala bersama pengusaha. Ujian rintis, sesi libat urus, dan penyelarasan dengan KKM, PEMUDAH dan EXCO negeri telah mengesahkan keberkesanan pendekatan baharu ini, sekali gus mengekalkan kawalan kesihatan awam sambil mengurangkan beban pematuhan dianggarkan RM19 juta setahun.\nProjek ini akan diinstitusikan melalui pemuktamadan SOP penilaian risiko baharu, penerapan alat penilaian kendiri di semua premis pendidikan awal, serta pemantauan berterusan bagi memastikan keselarasan dengan garis panduan kebangsaan.","impak":"Pengurangan beban pematuhan terhadap pengusaha premis dan ibu bapa melalui pendekatan penutupan bersasar, bukan lagi penutupan penuh premis.\nKawalan kesihatan awam kekal berkesan, dibuktikan dengan tren wabak yang menurun selepas pelaksanaan pendekatan lebih fleksibel.\n*Meningkatkan ketelusan dan kejelasan keputusan kawalan wabak melalui penggunaan Helaian Penilaian Risiko Kendiri.\nHubungan lebih baik antara JKNPP dan pengusaha premis hasil dialog, townhall dan libat urus berkala.\nPengusaha lebih berdaya tindak kerana mampu membuat penilaian risiko proaktif sebelum berlaku penularan.\nPengurangan gangguan kepada ibu bapa, kerana penutupan kelas sahaja lebih praktikal berbanding penutupan seluruh premis.\nKecekapan operasi JKNPP meningkat melalui proses siasatan dan penilaian risiko yang lebih sistematik dan konsisten.\nProtokol baharu berpotensi menjadi standard kebangsaan, selari dengan penyediaan garis panduan HFMD baharu oleh KKM.\nKelestarian jangka panjang terjaminmelalui institusionalisasi SOP penilaian risiko serta pemantauan berterusan oleh JKNPP.","pengiraan":"Penjimatan Kos Pematuhan kepada Pengusaha Premis RM611,000.00\n\n​Penjimatan Kos Pematuhan kepada ibu bapa RM3,467,500.00\n\nJumlah Kos Pematuhan : RM4,078,500.00\n\n​Jumlah Penjimatan am.\nProses lebih teratur dan telus melalui 12 langkah kerja yang seragam dan tersusun.\nPengurangan kos pematuhan kepada pelabur melalui proses yang lebih cepat dan jelas.\nPenjimatan peluang pelaburan yang sangat besar, dianggarkan RM1.48 bilion untuk 1,459 permohonan.\nLesen bertempoh membolehkan operasi awal, termasuk pembelian mesin, pemasangan dan commissioning lebih cepat.\nMempercepat urusan dengan MITI, terutamanya bagi kelulusan operasi dan insentif.\nMemudahkan permohonan pekerja asing, kerana lesen sementara berfungsi sebagai dokumen sah.\nMeningkatkan keyakinan pelabur, bank, vendor dan rakan perniagaan terhadap kesahihan projek.\nMengurangkan risiko projek tergendala akibat menunggu CCC sepenuhnya.\nMeningkatkan daya saing pelabur, membolehkan mereka memasuki pasaran lebih awal berbanding pesaing.","pengiraan":"Penjimatan Kos Pematuhan Tahunan  Pelabur sebanyak RM29,180.00\n\n​Penjimatan Kos Masa kepada Jabatan sebanyak RM96,731,700.00\n\nPenjimatan Kos Peluang kepada Pelabur sebanyak RM1,488,180,000.00\n\n​\n\nJumlah Penjimatan Kos Tahunan sebanyak RM1,584,940,880.00","rm":1584940880.0,"ahli":"Mohd Hairol bin Man\nMohd Ubaidillah bin Abdullah\nManggleshwary a/p Muniandy\nMuhammad Fahmi bin Zulkifli\nSiti Sulaiha binti As’ari\nNoor Ashikin binti Yusuf","scores":{"K1":5,"K2":5,"K3":5,"K4":4,"K5":5,"K6":5,"K7":2},"nota":"","xrank":1},{"id":"Negeri#93","bil":"93","kat":"Negeri","cy":true,"entiti":"NEGERI PULAU PINANG","agensi":"MAJLIS BANDARAYA SEBERANG PERAI","tajuk":"Mempercepat Proses Penghantaran Dokumen Tuntutan serta Pengurusan Pembayaran Pembekal daripada 107 Hari kepada 14 Hari.","penerima":"Pembekal-pembekal MBSP\nKontraktor MBSP\nVendor MBSP\nSebanyak 4,701 pembekal MBSP menerima manfaat dalam projek ini.","keterangan":"Sistem Pengurusan Invois Majlis Bandaraya Seberang Perai (SPi MBSP) diperkenalkan bagi menggantikan kaedah penghantaran dokumen secara fizikal di kaunter berpusat kepada sistem elektronik sepenuhnya mulai 1 November 2025.\nInisia    CLOUD SYNC — Supabase (data dikongsi secara live semua pengguna)

   Table Supabase: rkb_state  (id text PK, data jsonb, updated_by text, updated_at timestamptz)

const CLOUD_KEY = 'rkb_cloud_v2';
let _cloudTimer  = null;   // debounce push
let _cloudPoll   = null;   // polling interval
let _lastPullAt  = '';     // timestamp cloud terakhir ditarik
let _realtimeCh  = null;   // supabase realtime channel

function getCloudCfg(){
  // 1. Config di-embed dalam HTML (oleh Admin — disebarkan ke semua pengguna)
  try{
    const emb=document.getElementById('__sb_cfg__');
    if(emb&&emb.textContent.trim()){
      const c=JSON.parse(emb.textContent);
      if(c&&c.url&&c.key) return c;
    }
  }catch(e){}
  // 2. Config dalam localStorage (semasa konfigurasi)
  try{ return JSON.parse(localStorage.getItem(CLOUD_KEY))||{}; }catch(e){ return {}; }
}
function setCloudCfg(obj){
  localStorage.setItem(CLOUD_KEY, JSON.stringify(obj));
  _realtimeCh = null; // reset channel supaya dibuat semula
}
function clearCloudCfg(){
  localStorage.removeItem(CLOUD_KEY); stopCloudPoll(); _realtimeCh = null;
}

/* Header Supabase REST */
function sbHeaders(key, extra={}){
  return { 'apikey':key, 'Authorization':'Bearer '+key,
           'Content-Type':'application/json', 'Prefer':'resolution=merge-duplicates', ...extra };
}

/* Kemaskini indicator status cloud di topbar */
function setCloudStatus(s){
  const dot = document.getElementById('cloudDot');
  const txt = document.getElementById('cloudTxt');
  if(!dot||!txt) return;
  const MAP = {
    off:      ['#888','',''],
    ok:       ['#22c55e','●','Live'],
    syncing:  ['#f59e0b','●','Menyimpan…'],
    err:      ['#ef4444','●','Gagal'],
    loading:  ['#3b82f6','●','Memuatkan…'],
    waiting:  ['#888','○','Menunggu…'],
  };
  const [col,sym,lbl] = MAP[s]||MAP.off;
  dot.style.color=col; dot.textContent=sym; txt.textContent=lbl?(' '+lbl):'';
}

/* PUSH — hantar state ke Supabase */
async function pushToCloud(){
  const cfg=getCloudCfg(); if(!cfg.url||!cfg.key) return;
  try{
    setCloudStatus('syncing');
    const res = await fetch(cfg.url+'/rest/v1/rkb_state', {
      method: 'POST',
      headers: sbHeaders(cfg.key),
      body: JSON.stringify({
        id: 'main',
        data: state,
        updated_by: (session&&session.username)||'system',
        updated_at: new Date().toISOString()
      })
    });
    if(res.ok){ _lastPullAt = new Date().toISOString(); setCloudStatus('ok'); }
    else{ setCloudStatus('err'); }
  }catch(e){ setCloudStatus('err'); }
}

/* PULL — ambil state terkini dari Supabase */
async function pullFromCloud(){
  const cfg=getCloudCfg(); if(!cfg.url||!cfg.key) return null;
  try{
    const res = await fetch(cfg.url+'/rest/v1/rkb_state?id=eq.main&select=data,updated_by,updated_at',{
      headers: {'apikey':cfg.key,'Authorization':'Bearer '+cfg.key}
    });
    if(!res.ok) return null;
    const rows = await res.json();
    return (rows&&rows[0]) ? rows[0] : null;
  }catch(e){ return null; }
}

/* APPLY perubahan dari cloud (pengguna lain) */
function applyCloudUpdate(row, showToast=true){
  if(!row||!row.data) return;
  // Jangan apply jika kita sendiri yang simpan
  if(row.updated_by && session && row.updated_by===session.username) return;
  // Jangan apply jika timestamp sama
  if(row.updated_at && row.updated_at===_lastPullAt) return;
  _lastPullAt = row.updated_at||'';
  state = row.data; mergeDefaults(); computeRanks();
  localStorage.setItem(LS_KEY, JSON.stringify(state)); // sync localStorage
  setCloudStatus('ok');
  if(typeof curDraw==='function') curDraw();
  if(showToast){
    const ts = row.updated_at
      ? new Date(row.updated_at).toLocaleTimeString('ms-MY',{hour:'2-digit',minute:'2-digit'})
      : '';
    toast(`🔄 Data dikemas kini oleh @${row.updated_by||'pengguna lain'}${ts?' ('+ts+')':''}`, 'info');
  }
}

/* REALTIME via Supabase channel (jika SDK tersedia) */
function setupRealtime(){
  const cfg=getCloudCfg(); if(!cfg.url||!cfg.key) return;
  if(_realtimeCh) return; // sudah setup
  if(typeof window.supabase==='undefined') { startCloudPoll(); return; } // fallback polling
  try{
    const sbClient = window.supabase.createClient(cfg.url, cfg.key);
    _realtimeCh = sbClient.channel('rkb-realtime')
      .on('postgres_changes',{event:'*',schema:'public',table:'rkb_state'}, payload=>{
        if(payload.new) applyCloudUpdate(payload.new);
      })
      .subscribe(status=>{
        if(status==='SUBSCRIBED') setCloudStatus('ok');
        if(status==='CHANNEL_ERROR'){ _realtimeCh=null; startCloudPoll(); } // fallback
      });
  }catch(e){ startCloudPoll(); } // fallback polling
}

/* POLL setiap 4 saat (fallback jika realtime tidak tersedia) */
function startCloudPoll(){
  if(_cloudPoll) return;
  _cloudPoll = setInterval(async()=>{
    const row = await pullFromCloud();
    if(row) applyCloudUpdate(row);
  }, 4000);
}
function stopCloudPoll(){ clearInterval(_cloudPoll); _cloudPoll=null; }

/* DEBOUNCE PUSH — tunggu 1.5s selepas perubahan terakhir */
function scheduleCloudPush(){
  clearTimeout(_cloudTimer);
  _cloudTimer = setTimeout(()=>pushToCloud(), 1500);
}

/* INIT — muatkan dari cloud selepas login, kemudian setup realtime */
async function initCloudSync(){
  const cfg=getCloudCfg();
  if(!cfg.url||!cfg.key){ setCloudStatus('off'); return; }
  setCloudStatus('loading');
  const row = await pullFromCloud();
  if(row&&row.data){
    _lastPullAt = row.updated_at||'';
    state = row.data; mergeDefaults(); computeRanks();
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    setCloudStatus('ok');
  } else {
    // Pertama kali — push seed ke cloud
    await pushToCloud();
  }
  setupRealtime();
}

function anyk(t,ks){return ks.some(k=>t.includes(k));}
function cntk(t,ks){return ks.filter(k=>t.includes(k)).length;}
function hasBA(t){
  if(t.includes('sebelum')&&t.includes('selepas')) return true;
  if(/dari(?:pada)?\s+[\d.,]+.{0,50}(?:ke|kepada)\s+[\d.,]+/.test(t)) return true;
  if(/sebelum\s+(projek|rkb|pelaksanaan|dilaksana|inisiatif|perlaksanaan)/.test(t)&&
     /selepas\s+(projek|rkb|pelaksanaan|dilaksana|inisiatif|perlaksanaan)/.test(t)) return true;
  if(/(?:penurunan|berkurang|dikurangkan)\s+(?:sebanyak\s+)?[\d.,]+/.test(t)) return true;
  if(/\b(?:dipercepatkan|dipersingkat|dicepatkan|disingkatkan)\b/.test(t)) return true;
  if(/masa\s+(?:layan|respons|menunggu|tunggu|pemprosesan).{0,40}(?:kurang|singkat|cepat|pantas|pendek)/.test(t)) return true;
  if(/(?:lebih\s+(?:pantas|cepat|laju)|dipercepatkan)\s+(?:sebanyak\s+)?[\d.,]+/.test(t)) return true;
  return false;
}
function calcPct(t){
  let best=0;
  for(const m of t.matchAll(/([\d.,]+)\s*%/g)){const v=parseFloat(m[1].replace(',','.'));if(v>0&&v<=500)best=Math.max(best,v);}
  for(const pat of[/(?:pengurangan|berkurang|penurunan|dikurang).{0,30}([\d.,]+)\s*%/g,/([\d.,]+)\s*%\s*(?:pengurangan|penurunan|berkurang)/g,/(?:peningkatan|meningkat|ditingkat).{0,20}([\d.,]+)\s*%/g,/([\d.,]+)\s*%\s*(?:peningkatan|meningkat)/g]){
    for(const m of t.matchAll(pat)){const v=parseFloat(m[1].replace(',','.'));if(v>0&&v<=500)best=Math.max(best,v);}}
  for(const m of t.matchAll(/dari(?:pada)?\s*([\d.,]+)\s*(saat|minit|min|jam|hari|minggu|bulan|tahun).{0,50}?(?:ke|kepada)\s*([\d.,]+)\s*(saat|minit|min|jam|hari|minggu|bulan|tahun)/g)){
    try{const b=parseFloat(m[1].replace(',','.'))*UNIT_M[m[2]],a=parseFloat(m[3].replace(',','.'))*UNIT_M[m[4]];
    if(b>0&&b>a)best=Math.max(best,(b-a)/b*100);}catch(e){}}
  if(/serta[- ]?merta|masa nyata|real[- ]?time|seketika|segera/.test(t))best=Math.max(best,95);
  for(const m of t.matchAll(/dari(?:pada)?\s*([\d.,]+)\s*([a-zA-Z]+).{0,40}?(?:ke|kepada)\s*([\d.,]+)\s*([a-zA-Z]+)/g)){
    const uOk=m[2]===m[4]||['langkah','prosedur','proses','borang','kes','permohonan','dokumen','kali','tapak','laman'].includes(m[2]);
    if(uOk&&!UNIT_M[m[2]]){try{const b=parseFloat(m[1].replace(',','.')),a=parseFloat(m[3].replace(',','.'));if(b>0&&b>a)best=Math.max(best,(b-a)/b*100);}catch(e){}}}
  for(const m of t.matchAll(/(\d+)\s*kali\s*(?:lebih\s*)?(?:cepat|pantas|laju|singkat)/g)){
    const x=parseFloat(m[1]);if(x>1)best=Math.max(best,(1-1/x)*100);}
  return best;
}
function scoreProject(p){
  const tj=(p.tajuk||'').toLowerCase();const kt=(p.keterangan||'').toLowerCase();
  const im=(p.impak||'').toLowerCase();const pg=(p.pengiraan||'').toLowerCase();
  const bn=(p.penerima||'').toLowerCase();
  const blob=[tj,kt,im,pg].join(' ');const pk=im+' '+kt;const flags=[];
  const strat=cntk(blob,STRAT_W);let s1=3;
  if(strat>=2)s1=4;if(strat>=3&&anyk(bn,EXT_W))s1=5;
  if(strat===0&&anyk(bn,INT_W)&&!anyk(bn,EXT_W))s1=2;
  const ba=hasBA(pk);const pct=calcPct(pk);
  let s2=(!ba&&pct===0)?1:pct>70?5:pct>=50?4:pct>=25?3:2;
  if(!ba&&s2>3){flags.push('K2 dihad 3: tiada data sebelum/selepas');s2=3;}
  const hasCalc=/\d/.test(pg)&&(/[x×*]/.test(pg)||pg.includes('=')||pg.includes('darab')||/rm\s*[\d,]+/.test(pg));
  const savePct=calcPct(pg);const rm=p.rm;
  let s3=2;
  if(rm==null&&savePct===0){s3=2;flags.push('K3 dihad 2: tiada nilai RM/peratus');}
  else if(rm==null)s3=3;
  else if(rm<100000)s3=2;else if(rm<1000000)s3=3;else if(rm<=10000000)s3=4;else s3=5;
  if(rm!=null&&!hasCalc&&s3>3){flags.push('K3 dihad 3: tiada kaedah pengiraan');s3=3;}
  const adv=anyk(blob,ADV_W);const digi=anyk(blob,DIGI_W);const nadv=cntk(blob,ADV_W);
  const redesign=blob.includes('reka bentuk semula')||blob.includes('proses baharu')||blob.includes('penyederhanaan')||blob.includes('penstrukturan semula');
  let s4=adv&&(redesign||nadv>=2)?5:adv?4:digi?3:2;
  if(digi&&!adv&&!(ba||pct>0||redesign)&&s4>3){flags.push('K4 dihad 3: digital tanpa bukti perubahan proses');s4=3;}
  const oh=cntk(pk,OUT_W);const kpi=pk.includes('kpi');
  const meas=ba||pct>0||kpi||oh>=2;let s5;
  if(!meas){s5=2;flags.push('K5 dihad 2: output sahaja tanpa bukti outcome');}
  else if((ba||kpi)&&pct>=50&&oh>=2)s5=5;
  else if((ba||kpi)&&oh>=2)s5=4;
  else s5=3;
  let s6=3;
  if(anyk(bn,EXT_W))s6=4;
  const broad=['rakyat','industri','peniaga','pelabur','nasional','negara','sektor','awam','komuniti'].filter(k=>(bn+' '+blob).includes(k)).length;
  if(anyk(bn,EXT_W)&&broad>=2)s6=5;
  if(bn.trim().length<3){s6=3;flags.push('K6 dihad 3: penerima manfaat tidak jelas');}
  const sh=cntk(blob,SUS_W);
  let s7=sh===0?2:anyk(blob,['replikasi','peluasan','amalan tetap','institusi','diformali','prosedur tetap'])?4:3;
  if(blob.includes('institusi')&&(blob.includes('nasional')||blob.includes('replikasi'))&&sh>=2)s7=5;
  if(sh===0&&s7>3){flags.push('K7 dihad 3: tiada SOP/pemilik proses/replikasi');s7=3;}
  return{scores:{K1:s1,K2:s2,K3:s3,K4:s4,K5:s5,K6:s6,K7:s7},flags:flags.join('; ')};
}

function markah(p){ const w=state.weights; return Math.round(['K1','K2','K3','K4','K5','K6','K7'].reduce((s,k)=>s+(p.scores[k]/5*w[k]),0)*10)/10; }
function kategori(m){ return m>=85?'Sangat Cemerlang':m>=70?'Cemerlang':m>=55?'Baik':m>=40?'Memuaskan':'Perlu Penambahbaikan'; }
const KCOL={'Sangat Cemerlang':'var(--c-sc)','Cemerlang':'var(--c-c)','Baik':'var(--c-b)','Memuaskan':'var(--c-m)','Perlu Penambahbaikan':'var(--c-p)'};
function computeRanks(){
  // Rank dikira untuk setiap kombinasi skop × penanda.
  // TERPILIH (cy=true, xrank>0): rank mengikut xrank (rank pelarasan Excel)
  // SENARAI SIMPANAN (cy=false): rank mengikut markah menurun, selepas semua Terpilih
  state.projects.forEach(p=>p._r={});
  const scopes={'ALL':()=>true,'Kementerian':p=>p.kat==='Kementerian','Negeri':p=>p.kat==='Negeri'};
  const ys={'ALL':()=>true,'Y':p=>!!p.cy,'N':p=>!p.cy};
  for(const sk in scopes) for(const yk in ys){
    const sub=state.projects.filter(p=>scopes[sk](p)&&ys[yk](p));
    if(yk==='Y'){
      // Semua Terpilih: guna xrank terus, fallback markah
      const hasXR=sub.filter(p=>p.xrank&&p.xrank>0).sort((a,b)=>a.xrank-b.xrank);
      const noXR=sub.filter(p=>!(p.xrank&&p.xrank>0)).sort((a,b)=>markah(b)-markah(a));
      const maxXR=hasXR.length>0?Math.max(...hasXR.map(p=>p.xrank)):0;
      hasXR.forEach(p=>p._r[sk+'|'+yk]=p.xrank);
      noXR.forEach((p,i)=>p._r[sk+'|'+yk]=maxXR+i+1);
    } else if(yk==='N'){
      // Senarai Simpanan: rank by markah
      sub.sort((a,b)=>markah(b)-markah(a));
      sub.forEach((p,i)=>p._r[sk+'|'+yk]=i+1);
    } else {
      // ALL: Terpilih (xrank) dahulu, kemudian Simpanan (markah)
      const terpilih=sub.filter(p=>p.cy&&p.xrank&&p.xrank>0);
      const simpanan=sub.filter(p=>!(p.cy&&p.xrank&&p.xrank>0));
      // Untuk scope kategori (Kem/Neg): Terpilih sort by xrank
      // Untuk scope ALL (campur Kem+Neg): Terpilih sort by xrank within kat, then by kat
      if(sk==='ALL'){
        // Campur: sort Terpilih Kem dulu (xrank), kemudian Terpilih Neg (xrank), kemudian Simpanan (markah)
        const tKem=terpilih.filter(p=>p.kat==='Kementerian').sort((a,b)=>a.xrank-b.xrank);
        const tNeg=terpilih.filter(p=>p.kat==='Negeri').sort((a,b)=>a.xrank-b.xrank);
        const simp=simpanan.sort((a,b)=>markah(b)-markah(a));
        [...tKem,...tNeg,...simp].forEach((p,i)=>p._r[sk+'|'+yk]=i+1);
      } else {
        // Kementerian atau Negeri sahaja
        const tSorted=terpilih.sort((a,b)=>a.xrank-b.xrank);
        const sSorted=simpanan.sort((a,b)=>markah(b)-markah(a));
        const maxT=tSorted.length>0?Math.max(...tSorted.map(p=>p.xrank)):0;
        tSorted.forEach(p=>p._r[sk+'|'+yk]=p.xrank);
        sSorted.forEach((p,i)=>p._r[sk+'|'+yk]=maxT+i+1);
      }
    }
  }
  state.projects.forEach(p=>{ p._rank=p._r['ALL|ALL']; p['_rank_Kementerian']=p._r['Kementerian|ALL']; p['_rank_Negeri']=p._r['Negeri|ALL']; });
}

function withBusy(btn,fn){ // tukar pointer ke processing + spinner sementara
  if(btn&&btn.disabled) return; const old=btn?btn.innerHTML:null; document.body.classList.add('processing');
  if(btn){btn.disabled=true; btn.innerHTML='<span class="spin"></span> Memproses…';}
  setTimeout(()=>{ try{ fn(); } finally { document.body.classList.remove('processing'); if(btn){btn.disabled=false; btn.innerHTML=old;} } },180);
}

/* ---- LOGO RKB: imej PNG rasmi (base64 embedded) ---- */
function rkbLogo(h){ h=h||44; return `<img src="data:image/jpeg;base64,${LOGO_B64}" alt="Logo RKB" style="height:${h}px;width:auto;display:block">`; }

/* ============================================================
   LOGIN
   ============================================================ */
function initLogin(){
  $('#loginBrand').innerHTML = rkbLogo(64)+`<h2>Dashboard RKB</h2><div class="sub">Reformasi Kerenah Birokrasi · 2025 / 2026</div>`;
  const byRole=r=>SEED_USERS.filter(u=>u.role===r).map(u=>u.username);
  $('#demohint').innerHTML = `<b>Akaun dimuat dari senarai pengguna rasmi.</b><br>`+
    `<span class="muted">Admin (${byRole('Admin').length}) · Panel Penilai (${byRole('Panel Penilai').length}) · Pembimbing (${byRole('Pembimbing').length}). Sila log masuk dengan akaun anda. Pentadbir boleh urus akaun dalam tab Pengurusan Akaun.</span>`;
  $('#luser').value=''; $('#lpass').value='';
  $('#loginForm').addEventListener('submit',e=>{ e.preventDefault(); doLogin(); });
}
function doLogin(){
  const u=$('#luser').value.trim(), p=$('#lpass').value;
  const found=state.users.find(x=>x.username.toLowerCase()===u.toLowerCase() && x.password===p);
  const err=$('#loginErr');
  if(!found){ err.textContent='Nama pengguna atau kata laluan tidak sah.'; err.classList.remove('hidden'); return; }
  err.classList.add('hidden'); session={username:found.username, role:found.role};
  $('#luser').value=''; $('#lpass').value='';
  $('#login').classList.add('hidden'); $('#app').classList.remove('hidden');
  buildShell();
  // Start realtime sync selepas login (state sudah dimuatkan oleh initApp)
  const cfg=getCloudCfg();
  if(cfg&&cfg.url&&cfg.key) setupRealtime();
}
function logout(){
  session=null; tabUnlocked={}; $('#app').classList.add('hidden'); $('#login').classList.remove('hidden');
  $('#luser').value=''; $('#lpass').value=''; $('#loginErr').classList.add('hidden');
  $('#sidebar').classList.remove('open'); $('#backdrop').classList.remove('show');
}

/* ════════════════════════════════════════════════════════
   SIMPAN PERMANEN — embed state dalam fail HTML
   Data akan kekal walaupun localStorage dikosongkan,
   browser bertukar, atau fail dipindah ke folder lain.
   ════════════════════════════════════════════════════════ */
function simpanPermanen(){
  try{
    const stateJson=JSON.stringify(state);
    const now=new Date();
    const stamp=now.toLocaleDateString('ms-MY',{day:'2-digit',month:'long',year:'numeric'})+
                ' '+now.toLocaleTimeString('ms-MY',{hour:'2-digit',minute:'2-digit'});
    const htmlEl=document.documentElement.cloneNode(true);
    // Buang loader jika ada
    const ldr=htmlEl.querySelector('#initLoader'); if(ldr) ldr.remove();
    // Embed state
    const oldSt=htmlEl.querySelector('#__rkb_saved_state__'); if(oldSt) oldSt.remove();
    const stScr=document.createElement('script');
    stScr.id='__rkb_saved_state__'; stScr.type='application/json'; stScr.textContent=stateJson;
    htmlEl.querySelector('head').appendChild(stScr);
    // Embed Supabase config (supaya semua pengguna auto-connect tanpa setup)
    const cloudCfg=getCloudCfg();
    const oldCfg=htmlEl.querySelector('#__sb_cfg__'); if(oldCfg) oldCfg.remove();
    if(cloudCfg&&cloudCfg.url&&cloudCfg.key){
      const cfgScr=document.createElement('script');
      cfgScr.id='__sb_cfg__'; cfgScr.type='application/json';
      cfgScr.textContent=JSON.stringify({url:cloudCfg.url,key:cloudCfg.key});
      htmlEl.querySelector('head').appendChild(cfgScr);
    }
    // Nama fail dengan tarikh
    const d=now.toISOString().slice(0,10);
    const hasCfg=!!(cloudCfg&&cloudCfg.url&&cloudCfg.key);
    const fname=`dashboard_rkb${hasCfg?'_netlify':'_offline'}_${d}.html`;
    const blob=new Blob(['<!DOCTYPE html>\n'+htmlEl.outerHTML],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=fname; a.click();
    URL.revokeObjectURL(url);
    const msg=hasCfg
      ?`✓ ${fname}\nFail ini mengandungi konfigurasi Supabase.\nUpload ke Netlify — semua pengguna akan dapat live data secara automatik.`
      :`✓ ${fname}\nData tersimpan dalam fail (tiada cloud sync).`;
    toast(msg,'ok');
    const ind=document.getElementById('lastSavedStamp');
    if(ind) ind.textContent='Kekal: '+stamp;
  }catch(e){ toast('⚠ Gagal simpan: '+e.message,'warn'); }
}

/* ---- PENJANA JUSTIFIKASI PENILAIAN DALAM BENTUK AYAT ----
   hideScores=true → untuk Panel Penilai (tiada markah/skor ditunjukkan)   */
function proseJustif(p, hideScores){
  const sc=p.scores; const m=markah(p); const kat=kategori(m);
  const txt=((p.keterangan||'')+' '+(p.impak||'')).toLowerCase();
  const ben=(p.penerima||'').toLowerCase();
  const nota=p.nota||'';
  // Kesan data masa/proses
  const rmatch=txt.match(/dari(?:pada)?\s*([\d.]+)\s*(hari|jam|minit|minggu)\s*[\s\S]{0,30}?kepada\s*([\d.]+)\s*(hari|jam|minit|minggu)/i);
  const timeDetail=rmatch?` (daripada ${rmatch[1]} ${rmatch[2]} kepada ${rmatch[3]} ${rmatch[4]})`:'';
  const pctM=txt.match(/([\d.]+)\s*%/); const pct=pctM?parseFloat(pctM[1]):0;
  const hasBA=txt.includes('sebelum')&&txt.includes('selepas');
  // Nama dimensi
  const dN={K1:'Signifikan',K2:'Produktiviti',K3:'Penjimatan Kos',K4:'Inovasi',K5:'Outcome',K6:'Manfaat Stakeholder',K7:'Kemampanan'};
  // Penjanaan naratif per kriteria
  const n1=sc.K1>=5?`Projek ini menangani isu yang sangat kritikal dan memberi manfaat meluas kepada rakyat atau industri negara, dengan kepentingan strategik yang jelas.`
    :sc.K1==4?`Projek ini mempunyai kepentingan strategik yang baik dan relevan kepada sektor berkenaan, menyumbang kepada daya saing dan kemudahan perniagaan.`
    :sc.K1==3?`Projek menangani isu yang relevan di peringkat agensi. Terdapat potensi signifikan yang boleh dikembangkan lagi untuk memberi impak yang lebih luas.`
    :sc.K1==2?`Skop projek lebih tertumpu kepada keperluan dalaman agensi. Kaitan dengan agenda nasional atau signifikan strategik yang lebih luas perlu diperkukuhkan.`
    :`Signifikan projek tidak dapat dikenal pasti dengan jelas berdasarkan maklumat yang diberikan. Hujah strategik perlu ditambah baik.`;
  const n2=sc.K2>=5?`Projek membuktikan pengurangan masa/prosedur yang sangat drastik${timeDetail}, dengan data sebelum dan selepas yang kukuh. Ini merupakan transformasi proses yang luar biasa.`
    :sc.K2==4?`Projek berjaya mengurangkan masa atau bilangan prosedur secara ketara${timeDetail}${pct>50?` (${pct.toFixed(0)}% pengurangan)`:''}, disokong oleh bukti yang jelas.`
    :sc.K2==3?`Projek menunjukkan penambahbaikan produktiviti${timeDetail||pct>0?` dengan pengurangan yang diukur${pct>0?' ('+pct.toFixed(0)+'%)':''}`:' yang sederhana'}. ${hasBA?'Data sebelum/selepas tersedia.':'Data sebelum/selepas perlu dikukuhkan.'}`
    :sc.K2==2?`Projek menyatakan ada penambahbaikan proses namun tiada kuantifikasi yang jelas. Data sebelum dan selepas diperlukan untuk mengesahkan impak sebenar.`
    :`Tiada bukti penambahbaikan produktiviti yang dapat dikenal pasti. Maklumat pengurangan masa atau prosedur perlu dinyatakan.`;
  const n3=p.rm!=null?
    (sc.K3>=5?`Penjimatan kos pematuhan yang sangat tinggi (${fmtRM(p.rm)}) dengan pengiraan yang lengkap dan kaedah yang jelas, memberikan nilai untuk wang yang amat baik.`
    :sc.K3==4?`Penjimatan kos yang baik (${fmtRM(p.rm)}) dengan kaedah pengiraan yang munasabah.${nota.includes('kaedah')?' Walau bagaimanapun, kaedah pengiraan boleh diperkemas lagi.':''}`
    :sc.K3==3?`Penjimatan kos (${fmtRM(p.rm)}) berada pada tahap sederhana. ${nota.includes('kaedah')?'Kaedah pengiraan tidak dinyatakan dengan cukup jelas.':'Justifikasi kaedah pengiraan boleh diperkukuhkan.'}`
    :`Penjimatan kos (${fmtRM(p.rm)}) masih rendah atau kaedah pengiraan tidak mencukupi untuk mendapat keyakinan yang tinggi.`)
    :(sc.K3==2?`Tiada nilai penjimatan kos (RM) yang spesifik dinyatakan dalam projek ini. Pengiraan penjimatan kos pematuhan perlu disediakan untuk penilaian yang lebih tepat.`
    :`Maklumat kos pematuhan tidak lengkap. Pengiraan penjimatan kos perlu disertakan.`);
  const hasAI=txt.includes('kecerdasan buatan')||txt.includes(' ai ')||txt.includes('machine learning')||txt.includes('analitik');
  const hasAuto=txt.includes('automasi')||txt.includes('automat'); const hasRedes=txt.includes('reka bentuk semula')||txt.includes('penyederhanaan');
  const hasDigi=txt.includes('digital')||txt.includes('sistem')||txt.includes('platform')||txt.includes('aplikasi');
  const n4=sc.K4>=5?`Projek menggunakan teknologi maju${hasAI?' (kecerdasan buatan/analitik data)':''} dengan reka bentuk semula proses yang menyeluruh. Ini jauh melampaui sekadar digitalisasi dan menunjukkan inovasi yang tulen.`
    :sc.K4==4?`Projek menggunakan ${hasAuto?'automasi proses':hasRedes?'reka bentuk semula proses':'integrasi sistem'} yang substantif, membawa perubahan nyata kepada cara kerja sedia ada.`
    :sc.K4==3?`Projek melibatkan ${hasDigi?'digitalisasi dan pembangunan sistem/platform':'penyelesaian digital'} yang membawa penambahbaikan. Inovasi masih di tahap asas dan potensi untuk ditingkatkan lagi.`
    :sc.K4==2?`Penyelesaian yang ditawarkan merupakan penambahbaikan proses yang kecil tanpa perubahan besar kepada reka bentuk atau pendekatan baharu yang inovatif.`
    :`Tiada inovasi atau penyelesaian baharu yang jelas. Pendekatan sedia ada perlu dipertimbangkan semula.`;
  const n5=sc.K5>=5?`Projek mempamerkan outcome yang sangat kukuh, dengan KPI yang tercapai, data sebelum/selepas yang komprehensif dan keputusan yang telah disahkan secara bebas.`
    :sc.K5==4?`Outcome projek jelas dibuktikan${hasBA?' dengan perbandingan data sebelum dan selepas':''}. Pencapaian sasaran dapat diverifikasi melalui data yang disediakan.`
    :sc.K5==3?`Projek menunjukkan tanda awal outcome yang positif, namun bukti yang lebih kukuh seperti data KPI atau maklum balas penerima manfaat perlu ditambah untuk mengesahkan impak sebenar.`
    :sc.K5==2?`Maklumat projek lebih menceritakan apa yang dilakukan (output) berbanding perubahan sebenar yang berlaku (outcome). Bukti impak jangka masa perlu dikukuhkan.`
    :`Tiada bukti outcome yang dapat dikenal pasti. Penilaian terbatas kepada output yang diterangkan.`;
  const broad=ben.includes('rakyat')||ben.includes('industri')||ben.includes('peniaga')||ben.includes('pelabur')||ben.includes('orang awam');
  const n6=sc.K6>=5?`Manfaat projek merangkumi kalangan yang sangat luas ${broad&&ben.length>5?'('+ben.slice(0,70).replace(/\n/g,' ')+')':''}, memberikan impak nasional yang signifikan merentasi pelbagai sektor.`
    :sc.K6==4?`Projek memberi manfaat yang jelas kepada kumpulan luaran tertentu${ben.length>5?' seperti: '+ben.slice(0,60).replace(/\n/g,' '):''}, dengan skala penerima manfaat yang baik.`
    :sc.K6==3?`Penerima manfaat telah dikenal pasti namun terhad kepada kumpulan tertentu. Potensi manfaat yang lebih luas masih boleh dikembangkan.`
    :`Maklumat penerima manfaat tidak jelas atau hanya tertumpu kepada warga dalaman agensi. Manfaat kepada pihak luar perlu dinyatakan.`;
  const hasSOP=txt.includes('sop'); const hasRep=txt.includes('replikasi')||txt.includes('peluasan'); const hasKPI=txt.includes('kpi');
  const n7=sc.K7>=5?`Projek mempunyai mekanisme kemampanan yang sangat kukuh${hasSOP?', SOP telah digubal':''}${hasRep?', dengan pelan peluasan/replikasi yang jelas':''}. Model ini sesuai dijadikan amalan terbaik kebangsaan.`
    :sc.K7==4?`Terdapat bukti kemampanan${hasSOP?', termasuk SOP/SLA':hasKPI?', termasuk KPI':''} dan potensi replikasi yang baik. Projek boleh dijadikan rujukan oleh agensi lain.`
    :sc.K7==3?`Projek menunjukkan beberapa ciri kemampanan asas${hasSOP?', termasuk penyediaan SOP':''}. Pelan penginstitusian dan replikasi perlu diperkukuhkan untuk memastikan kesinambungan.`
    :sc.K7==2?`Mekanisme kemampanan jangka panjang tidak dinyatakan. Tiada maklumat tentang pemilik proses, SOP, atau pelan kesinambungan selepas projek selesai.`
    :`Tiada maklumat tentang kemampanan projek. Aspek ini kritikal untuk memastikan manfaat projek kekal selepas pelaksanaan.`;
  // Rumusan keseluruhan
  const ks=['K1','K2','K3','K4','K5','K6','K7'];
  const best=ks.reduce((a,b)=>sc[a]>=sc[b]?a:b); const worst=ks.reduce((a,b)=>sc[a]<=sc[b]?a:b);
  const summary=`Projek ini memperoleh markah <b>${m.toFixed(1)}/100 (${kat})</b>. Kekuatan utama ialah dimensi <b>${dN[best]}</b> (skor ${sc[best]}/5). ${sc[worst]<=2?`Dimensi yang perlu ditingkatkan ialah <b>${dN[worst]}</b> (skor ${sc[worst]}/5).`:`Prestasi seimbang merentasi kesemua dimensi penilaian.`}${nota?` <i style="color:#CC0000">Had skor dicetuskan: ${nota.split(';')[0]}</i>`:''}`;
  const paras=[n1,n2,n3,n4,n5,n6,n7];
  const kLabels=['K1 — Signifikan & Keutamaan Strategik','K2 — Impak Produktiviti & Kecekapan Proses','K3 — Penjimatan Kos & Nilai untuk Wang','K4 — Kualiti Penyelesaian & Inovasi','K5 — Keberhasilan & Pembuktian Outcome','K6 — Manfaat Strategik Stakeholder','K7 — Kemampanan, Replikasi & Institusionalisasi'];
  const kHeader=(i)=>hideScores?kLabels[i]:`${kLabels[i]} (${sc[ks[i]]}/5)`;
  return `<div style="font-size:.84rem;line-height:1.7;color:var(--ink)">
    ${hideScores?'':`<div style="background:#F8F0F0;border-left:4px solid #CC0000;padding:11px 14px;margin-bottom:14px;border-radius:0 8px 8px 0;font-size:.86rem">${summary}</div>`}
    ${paras.map((n,i)=>`<p style="margin-bottom:10px"><b style="color:#1A1A1A;font-size:.8rem;display:block;margin-bottom:3px">${kHeader(i)}</b>${n}</p>`).join('')}
  </div>`;
}

function filterProjects(ps, qk, qn, qa){
  qk=(qk||'').toLowerCase().trim(); qn=(qn||'').toLowerCase().trim(); qa=(qa||'').toLowerCase().trim();
  return ps.filter(p=>{
    if(qk && !(p.kat==='Kementerian' && p.entiti.toLowerCase().includes(qk))) return false;
    if(qn && !(p.kat==='Negeri' && p.entiti.toLowerCase().includes(qn))) return false;
    if(qa && !p.agensi.toLowerCase().includes(qa)) return false;
    return true;
  });
}

function parseCSVsemicolon(text){ text=text.replace(/^\uFEFF/,''); const rows=[]; let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i]; if(q){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
  else{if(ch==='"')q=true; else if(ch===';'){row.push(cur);cur='';}else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(ch==='\r'){}else cur+=ch;}}
  if(cur!==''||row.length){row.push(cur);rows.push(row);} return rows;}
function rowsToObjects(rows){ const head=rows[0].map(h=>h.trim().replace(/\s+/g,' ').toUpperCase()); const out=[];
  const find=keys=>head.findIndex(h=>keys.some(k=>h.includes(k)));
  const ix={bil:find(['BIL']),ent:find(['KEMENTERIAN / NEGERI','KEMENTERIAN','NEGERI']),ag:find(['AGENSI']),taj:find(['TAJUK']),
    pen:find(['PENERIMA']),ket:find(['KETERANGAN']),imp:find(['IMPAK']),pgr:find(['PENGIRAAN']),rm:find(['(RM)','PENJIMATAN KOS'])};
  for(let i=1;i<rows.length;i++){const r=rows[i]; if(!r||r.join('').trim()==='')continue;
    out.push({bil:(r[ix.bil]||'').trim(),entiti:(r[ix.ent]||'').trim(),agensi:(r[ix.ag]||'').trim(),tajuk:(r[ix.taj]||'').trim(),
      penerima:(r[ix.pen]||'').trim(),keterangan:(r[ix.ket]||'').trim(),impak:(r[ix.imp]||'').trim(),pengiraan:(r[ix.pgr]||'').trim(),rm:parseRM(r[ix.rm])});}
  return out;}
function detectCat(name){name=(name||'').toUpperCase();if(name.includes('NEGERI'))return 'Negeri';if(name.includes('KEMENTERIAN'))return 'Kementerian';return null;}
function upsertProjects(records,cat){let added=0,updated=0;
  records.forEach(rec=>{if(!rec.bil)return;const id=cat+'#'+rec.bil;let p=state.projects.find(x=>x.id===id);
    const flds=['entiti','agensi','tajuk','penerima','keterangan','impak','pengiraan','rm'];
    if(p){let chg=false;flds.forEach(f=>{if((rec[f]||'')!==(p[f]||'')&&!(f==='rm'&&rec[f]==null)){p[f]=rec[f];chg=true;}});if(chg){updated++;const s=scoreProject(p);p.scores=s.scores;p.nota=s.flags;}}
    else{p={id,bil:rec.bil,kat:cat,cy:false};flds.forEach(f=>p[f]=rec[f]);const s=scoreProject(p);p.scores=s.scores;p.nota=s.flags;state.projects.push(p);added++;}});
  return {added,updated};}
function updateProjects(){if(!pendingProjFile){toast('Sila pilih fail dahulu','warn');return;}
  let cat=$('#projCat').value;if(cat==='auto')cat=detectCat(pendingProjFile.name);
  if(!cat){toast('Tidak dapat kesan kategori — sila pilih','bad');return;}
  const name=pendingProjFile.name.toLowerCase();const reader=new FileReader();
  const done=(records)=>{const r=upsertProjects(records,cat);saveState();computeRanks();
    toast(`Berjaya: ${r.added} projek baharu, ${r.updated} dikemas kini`,'ok');pendingProjFile=null;renderUploadTab();};
  if(name.endsWith('.csv')){reader.onload=()=>{try{done(rowsToObjects(parseCSVsemicolon(reader.result)));}catch(e){toast('Gagal membaca CSV','bad');}};reader.readAsText(pendingProjFile);}
  else{reader.onload=()=>{try{const wb=XLSX.read(reader.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];done(rowsToObjects(XLSX.utils.sheet_to_json(ws,{header:1,defval:''}).map(r=>r.map(c=>''+c))));}catch(e){toast('Gagal membaca XLSX','bad');}};reader.readAsArrayBuffer(pendingProjFile);}}
function updateRubric(){if(!pendingRubFile){toast('Sila pilih fail rubrik','warn');return;}
  const reader=new FileReader();
  reader.onload=()=>{if(typeof mammoth==='undefined'){toast('Pembaca DOCX memerlukan internet','bad');return;}
    mammoth.extractRawText({arrayBuffer:reader.result}).then(res=>{const txt=res.value;let found=0;
      Object.keys(KNAMES).forEach((k,i)=>{const re=new RegExp('(kriteria\\s*'+(i+1)+'|\\b'+k+'\\b)[\\s\\S]{0,80}?(\\d{1,3})\\s*%','i');const m=txt.match(re);if(m){state.weights[k]=parseInt(m[2]);found++;}});
      state.rubricName=pendingRubFile.name;rescoreAll();saveState();computeRanks();
      toast(found?`${found} wajaran dikemas kini & semua projek dinilai semula`:'Projek dinilai semula (wajaran sedia dikekalkan)','ok');pendingRubFile=null;renderUploadTab();
    }).catch(()=>toast('Gagal membaca fail rubrik','bad'));};
  reader.readAsArrayBuffer(pendingRubFile);}

/* ─── AUTO-SIJIL LOGIC ────────────────────────────────────────────────────
   KSN  : top-20 terpilih — WAJIB undi panel (Setuju majoriti → KSN)
   KPPA : auto — rank 21+ ATAU top-20 undi majoriti Tidak Setuju
   MPC  : auto — semua projek Senarai Simpanan (cy=false)
   Admin boleh override mana-mana melalui state.secretariat[id]
──────────────────────────────────────────────────────────────────────── */
function getAutoSijil(p){
  if(!p.cy) return 'MPC';                           // Senarai Simpanan → MPC
  const rk=p._r[(p.kat)+'|Y']||999;
  if(rk>20)  return 'KPPA';                         // Rank 21+ → KPPA auto
  // Top-20: tentukan mengikut undi panel
  const pus=panelUsers(); const dec=state.decisions[p.id]||{};
  const nS=pus.filter(u=>dec[u]==='Setuju').length;
  const nT=pus.filter(u=>dec[u]==='Tidak Setuju').length;
  if(nT>nS)  return 'KPPA';                         // Majoriti Tidak Setuju → KPPA
  return 'KSN';                                     // Majoriti Setuju / belum undi → KSN pending
}
function getSijilType(p){
  const sek=state.secretariat[p.id]||'';
  if(sek.includes('KSN'))  return 'KSN';
  if(sek.includes('KPPA')) return 'KPPA';
  if(sek.includes('MPC'))  return 'MPC';
  return getAutoSijil(p);
}
function isAdminOverride(p){ return !!(state.secretariat[p.id]); }

function panelVoteSummary(p){
  const pus=panelUsers(); const dec=state.decisions[p.id]||{};
  const nS=pus.filter(u=>dec[u]==='Setuju').length;
  const nT=pus.filter(u=>dec[u]==='Tidak Setuju').length;
  const nB=pus.length-nS-nT;
  if(!pus.length) return '<span class="muted">Tiada panel</span>';
  const parts=[];
  if(nS) parts.push(`<span style="color:#1F8A4C;font-weight:700">✓ ${nS}</span>`);
  if(nT) parts.push(`<span style="color:#CC0000;font-weight:700">✗ ${nT}</span>`);
  if(nB) parts.push(`<span class="muted">${nB} belum</span>`);
  return parts.join(' · ')||'<span class="muted">Belum dinilai</span>';
}
function panelDecSummary(p){
  const sek=state.secretariat[p.id]||'';
  if(sek) return `<span style="font-weight:700;color:${sek.includes('KSN')?'#1F8A4C':sek.includes('KPPA')?'#CC0000':'#1A5FAD'}">${sek.replace('SIJIL PENGHARGAAN ','')}</span>`;
  return panelVoteSummary(p);
}

    const undiCell=(p)=>{
      const dec=state.decisions[p.id]||{};
      const nS=pus.filter(u=>dec[u]==='Setuju').length;
      const nT=pus.filter(u=>dec[u]==='Tidak Setuju').length;
      const nB=pus.length-nS-nT;
      const parts=[];
      if(nS) parts.push(`<span style="color:#1F8A4C;font-weight:700">✓ ${nS}</span>`);
      if(nT) parts.push(`<span style="color:#CC0000;font-weight:700">✗ ${nT}</span>`);
      if(nB) parts.push(`<span style="color:#888">${nB} belum</span>`);
      return parts.join(' · ')||'<span style="color:#888">Belum dinilai</span>';
    };

    // Fungsi CATATAN PANEL (KPPA sahaja)
    const catatanCell=(p)=>{
      const dec=state.decisions[p.id]||{};
      const nota=Object.keys(dec).map(u=>dec[u]==='Tidak Setuju'?(state.notes[p.id]||{})[u]:'').filter(Boolean)[0]||'';
      return nota?`<div style="color:#CC0000;font-style:italic;font-size:8pt">"${esc(nota)}"</div>`:'—';
    };

    const tblHtml=([cat,rows])=>{
      if(!rows.length) return '';
      // Header — sama persis dengan skrin (kecuali KEMASKINI tidak dimasukkan)
      const thBase=`
        <th style="padding:6px 8px;width:28px;text-align:center">BIL.</th>
        <th style="padding:6px 8px;width:14%">${cat==='Kementerian'?'KEMENTERIAN':'NEGERI'}</th>

        ${needPanel?'<th style="padding:6px 8px;width:14%">UNDI PANEL</th>':''}
        ${needCatatan?'<th style="padding:6px 8px;width:16%">CATATAN PANEL</th>':''}
        <th style="padding:6px 8px;width:15%">KEPUTUSAN PANEL</th>`;
      let no=1;
      const rowsHtml=rows.map((p,i)=>`
        <tr style="border-bottom:1px solid #E0E0E0;${i%2?'background:#FAFAFA':''}">
          <td style="padding:5px 8px;text-align:center">${no++}</td>
          <td style="padding:5px 8px;font-weight:700;font-size:8.5pt">${esc(p.entiti)}</td>
          <td style="padding:5px 8px;color:#555;font-size:8pt">${esc(p.agensi)}</td>
          <td style="padding:5px 8px;font-weight:600;font-size:8.5pt">${esc(p.tajuk)}</td>
          <td style="padding:5px 8px;line-height:1.6;font-size:8pt">${p.ahli?p.ahli.split('\n').filter(n=>n.trim()).map(n=>`• ${esc(n)}`).join('<br>'):'—'}</td>
          ${needPanel?`<td style="padding:5px 8px;font-size:8pt">${undiCell(p)}</td>`:''}
          ${needCatatan?`<td style="padding:5px 8px;font-size:8pt">${catatanCell(p)}</td>`:''}
          <td style="padding:5px 8px;font-size:8.5pt">${keputusanCell(p)}</td>
        </tr>`).join('');
      return `
        <div style="margin-top:22px">
          <div style="background:#1A1A1A;color:#fff;padding:7px 12px;font-size:9pt;font-weight:700;letter-spacing:.05em">${cat.toUpperCase()}</div>
          <table style="width:100%;border-collapse:collapse;font-size:9pt">
            <thead><tr style="background:#333;color:#fff">${thBase}</tr></thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>`;
    };

    // Statistik ringkas
    const totalKem=kem.length; const totalNeg=neg.length;
    const statLine=`${totalKem+totalNeg} projek (Kementerian: ${totalKem}, Negeri: ${totalNeg})`;

    const pw=window.open('','_blank','width=1200,height=800');
    pw.document.write(`<!DOCTYPE html><html><head>
      <title>Laporan Sijil Penghargaan ${_lapTab} — RKB 2025/2026</title>
      <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;padding:24px 32px;color:#1A1A1A;font-size:9pt}
        @page{size:A4 landscape;margin:15mm}
        @media print{body{padding:0}.no-print{display:none}}
        table{page-break-inside:auto}tr{page-break-inside:avoid}
        .print-btn{position:fixed;bottom:20px;right:20px;background:#1A1A1A;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:10pt;cursor:pointer}
      </style>
    </head><body>
      <!-- Pengepala laporan -->
      <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:18px;border-bottom:3px solid ${m.color};padding-bottom:14px">
        <div style="width:8px;min-height:50px;background:${m.color};border-radius:3px;flex-shrink:0"></div>
        <div style="flex:1">
          <div style="font-size:14pt;font-weight:800;color:${m.color}">${m.icon} SIJIL PENGHARGAAN ${_lapTab}</div>
          <div style="font-size:10pt;color:#444;margin-top:3px">Reformasi Kerenah Birokrasi (RKB) 2025/2026</div>
          <div style="display:flex;gap:24px;margin-top:8px;font-size:8.5pt;color:#555">
            <span>📅 Dicetak: <b>${new Date().toLocaleDateString('ms-MY',{day:'2-digit',month:'long',year:'numeric'})}</b></span>
            <span>📋 Jumlah: <b>${statLine}</b></span>
            ${_lapTab!=='KSN'?`<span>⚙ Ditetapkan: <b>Automatik oleh sistem</b></span>`:`<span>✅ Berdasarkan: <b>Undi Panel Penilai</b></span>`}
          </div>
        </div>
      </div>
      ${groups.map(tblHtml).join('')}
      <button class="print-btn no-print" onclick="window.print()">🖨 Cetak</button>
    </body></html>`);
    pw.document.close(); pw.focus(); setTimeout(()=>pw.print(),700);
  });
  drawLap();
}

function editUser(i){
  const u=i==null?{username:'',password:'',role:'Panel Penilai'}:state.users[i];
  $('#modalCard').innerHTML=`<div class="modalhead"><h3>${i==null?'Tambah':'Edit'} Akaun</h3><button class="x" onclick="closeModal()">×</button></div>
   <div class="modalbody">
     <div class="frow"><div class="k">Username</div><input class="inp" style="width:100%" id="uU" value="${esc(u.username)}"></div>
     <div class="frow"><div class="k">Password</div><input class="inp" style="width:100%" id="uP" value="${esc(u.password)}"></div>
     <div class="frow"><div class="k">Peranan</div><select class="sel" id="uR" style="width:100%">${['Admin','Panel Penilai','Pembimbing'].map(r=>`<option ${u.role===r?'selected':''}>${r}</option>`).join('')}</select></div>
     <button class="btn" style="background:#CC0000" id="saveUser">Simpan</button></div>`;
  $('#modal').classList.add('show');
  $('#saveUser').addEventListener('click',function(){withBusy(this,()=>{const un=$('#uU').value.trim(),pw=$('#uP').value,role=$('#uR').value;
    if(!un||!pw){toast('Username & password diperlukan','warn');return;}
    if(i==null){if(state.users.find(x=>x.username.toLowerCase()===un.toLowerCase())){toast('Username telah wujud','bad');return;}state.users.push({username:un,password:pw,role});}
    else{const old=state.users[i].username;state.users[i]={username:un,password:pw,role};
      if(old!==un&&state.decisions){for(const pid in state.decisions){if(state.decisions[pid][old]!=null){state.decisions[pid][un]=state.decisions[pid][old];delete state.decisions[pid][old];}}}
    }saveState();closeModal();toast('Akaun disimpan','ok');renderAkaun();});});
}
function delUser(i){const u=state.users[i];if(u.username===session.username){toast('Tidak boleh padam akaun sendiri','bad');return;}if(!confirm('Padam akaun '+u.username+'?'))return;
  state.users.splice(i,1);saveState();toast('Akaun dipadam','ok');renderAkaun();}

   </tr></thead><tbody id="peBody"></tbody></table></div>
   <div class="note" style="margin-top:12px">Projek <b>Tidak Setuju</b> akan dicadangkan ke Sijil KPPA. Nyatakan sebab dalam kotak catatan.</div>`;
  const base=()=>state.projects.filter(p=>p.kat===cat&&p.cy).sort((a,b)=>(a._r[cat+'|Y']||999)-(b._r[cat+'|Y']||999)).slice(0,20);
  const draw=()=>{

    $('#peBody').innerHTML=rows.map(p=>{
