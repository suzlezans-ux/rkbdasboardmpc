      const curNote=(state.notes[p.id]||{})[me]||'';
      const isTidak=cur==='Tidak Setuju';
      const decColor=cur==='Setuju'?'#1F8A4C':cur==='Tidak Setuju'?'#CC0000':'';
      const safeId=p.id.replace(/[^a-zA-Z0-9_-]/g,'_');  // CSS-safe ID
      return `<tr style="${isTidak?'background:#FFF5F5':''}">
        <td class="rank">${rankFor(p,cat,'Bertanda Y')}</td>
        <td class="ent">${esc(p.entiti)}</td><td class="muted">${esc(p.agensi)}</td>
        <td class="tajuk">${esc(p.tajuk)}</td><td class="rm">${fmtRM(p.rm)}</td>
        <td style="padding:8px">
          <select class="decsel" data-id="${p.id}" style="${decColor?'border-color:'+decColor+';color:'+decColor+';font-weight:700':''}">
            <option value="">— Pilih Keputusan —</option>
            <option ${cur==='Setuju'?'selected':''}>Setuju</option>
            <option ${isTidak?'selected':''}>Tidak Setuju</option>
          </select>
          <div id="nota-${safeId}" style="margin-top:6px;${isTidak?'':'display:none'}">
            <textarea class="inp nota-inp" data-id="${p.id}" placeholder="Nyatakan sebab tidak setuju…" style="width:100%;min-height:56px;font-size:.8rem;border-color:#CC0000;resize:vertical">${esc(curNote)}</textarea>
          </div>
        </td>
        <td>
          <button class="eyebtn" onclick="openProject('${p.id}')">Lihat</button>
          <button class="btn sm ghost" style="${cur?'background:'+decColor+';color:#fff;border-color:'+decColor:''}" data-save="${p.id}" ${cur?'':'disabled'}>${cur?'Kemaskini':'Simpan'}</button>
        </td></tr>`;
    }).join('')||`<tr><td colspan="7" class="empty">Tiada projek.</td></tr>`;

    // Toggle nota box serta-merta bila dropdown berubah
    $$('#peBody .decsel').forEach(sel=>sel.addEventListener('change',e=>{
      const pid=e.target.dataset.id;
      const safeId=pid.replace(/[^a-zA-Z0-9_-]/g,'_');
      const notaBox=document.getElementById('nota-'+safeId);
      const btn=$('[data-save="'+pid+'"]');
      const isTidak=e.target.value==='Tidak Setuju';
      if(notaBox) notaBox.style.display=isTidak?'block':'none';
      const dc=e.target.value==='Setuju'?'#1F8A4C':e.target.value==='Tidak Setuju'?'#CC0000':'';
      e.target.style.borderColor=dc; e.target.style.color=dc; e.target.style.fontWeight=dc?'700':'';
      if(btn){btn.disabled=!e.target.value; btn.style.background=dc||''; btn.style.color=dc?'#fff':'';
              btn.style.borderColor=dc||''; btn.classList.toggle('ghost',!e.target.value);}
    }));

    // Simpan keputusan + catatan
    $$('#peBody [data-save]').forEach(btn=>btn.addEventListener('click',function(){
      const pid=this.dataset.save;
      const val=$('.decsel[data-id="'+pid+'"]').value;
      const nota=$('.nota-inp[data-id="'+pid+'"]');
      const notaTxt=nota?nota.value.trim():'';
      if(!val)return;
      withBusy(this,()=>{
        if(!state.decisions[pid]) state.decisions[pid]={};
        if(!state.notes[pid])    state.notes[pid]={};
        state.decisions[pid][me]=val;
        if(val==='Tidak Setuju') state.notes[pid][me]=notaTxt;
        else delete state.notes[pid][me];
        saveState();
        const msg=val==='Setuju'?'Disimpan — dicadang KSN ✓':'Disimpan — dicadang KPPA. Catatan tersimpan ✓';
        toast(msg,'ok');
        draw();
      });
    }));
  };
  $$('#'+ids[0]+', #'+ids[1]).forEach(el=>el&&el.addEventListener('input',draw));
  draw();

    <td class="rank">${rankFor(p,cat,'Bertanda Y')}</td><td class="ent">${esc(p.entiti)}</td><td class="muted">${esc(p.agensi)}</td>
    <td class="tajuk">${esc(p.tajuk)}</td><td class="rm">${fmtRM(p.rm)}</td>
    <td><button class="eyebtn" onclick="openProject('${p.id}')">Lihat</button></td></tr>`).join('')
    :`<tr><td colspan="6" class="empty">Tiada projek terpilih Rank 21 ke atas.</td></tr>`;
}
function renderPanelDone(cat){
  const me=session.username;
  const ids=cat==='Kementerian'?['pdk','pda']:['pdn','pda2'];
  const pholds=cat==='Kementerian'?['Cari Kementerian…','Cari Agensi…']:['Cari Negeri…','Cari Agensi…'];
  $('#content').innerHTML=`
   <div class="pagehead"><h2>Telah Dinilai — ${cat}</h2><p>Projek ${cat} yang telah anda nilai. Boleh kemaskini semula.</p></div>
   <div class="toolbar">
     <input class="inp" id="${ids[0]}" placeholder="${pholds[0]}" style="min-width:180px">
     <input class="inp" id="${ids[1]}" placeholder="${pholds[1]}" style="min-width:160px">
   </div>
   <div class="tablewrap"><table class="dt"><thead><tr><th class="c">RANK</th><th>${cat.toUpperCase()}</th><th>AGENSI</th><th>TAJUK PROJEK</th><th>KEPUTUSAN</th><th>TINDAKAN</th></tr></thead><tbody id="pdBody"></tbody></table></div>`;
  const base=()=>state.projects.filter(p=>p.kat===cat&&p.cy&&(state.decisions[p.id]||{})[me]).sort((a,b)=>(a._r[cat+'|Y']||999)-(b._r[cat+'|Y']||999));
  const draw=()=>{
    const qe=($('#'+ids[0]).value||'').toLowerCase().trim();
    const qa=($('#'+ids[1]).value||'').toLowerCase().trim();
    const rows=base().filter(p=>(!qe||p.entiti.toLowerCase().includes(qe))&&(!qa||p.agensi.toLowerCase().includes(qa)));
    $('#pdBody').innerHTML=rows.map(p=>{const cur=state.decisions[p.id][me];
      return `<tr><td class="rank">${rankFor(p,cat,'Bertanda Y')}</td><td class="ent">${esc(p.entiti)}</td><td class="muted">${esc(p.agensi)}</td><td class="tajuk">${esc(p.tajuk)}</td>
      <td><select class="decsel" data-id="${p.id}">${DEC_OPTS.map(o=>`<option ${cur===o?'selected':''}>${o}</option>`).join('')}</select></td>
      <td><button class="eyebtn" onclick="openProject('${p.id}')">Lihat</button> <button class="btn sm" style="background:#1F8A4C" data-up="${p.id}">Kemaskini</button></td></tr>`;
    }).join('')||`<tr><td colspan="6" class="empty">Belum ada projek dinilai.</td></tr>`;
    $$('#pdBody [data-up]').forEach(b=>b.addEventListener('click',function(){const id=this.dataset.up;withBusy(this,()=>{state.decisions[id][me]=$('.decsel[data-id="'+id+'"]').value;saveState();toast('Keputusan dikemas kini','ok');});}));
  };
  $$('#'+ids[0]+', #'+ids[1]).forEach(el=>el&&el.addEventListener('input',draw)); draw();
}

/* ============================================================
   RESET DATA
   ============================================================ */
function doReset(kind){
  if(kind==='decisions'){if(!confirm('Reset SEMUA keputusan panel & sekretariat? Akaun & data projek dikekalkan.'))return;
    state.decisions={};state.secretariat={};saveState();toast('Keputusan panel & sekretariat direset','ok');refresh();}
  else if(kind==='all'){if(!confirm('Reset SEMUA: skor/markah projek kembali kepada fail asal CSV, serta semua keputusan dipadam. Akaun pengguna DIKEKALKAN. Teruskan?'))return;
    const users=deepClone(state.users);state=freshState();state.users=users;saveState();computeRanks();toast('Data projek & keputusan direset kepada keadaan asal','ok');buildShell();}}

/* ============================================================
   INIT & EVENT WIRING
   ============================================================ */
$('#ham').addEventListener('click',()=>{$('#sidebar').classList.toggle('open');$('#backdrop').classList.toggle('show');});
$('#backdrop').addEventListener('click',()=>{$('#sidebar').classList.remove('open');$('#backdrop').classList.remove('show');});
$('#logoutBtn').addEventListener('click',logout);
const _origBuild=buildShell;
buildShell=function(){ _origBuild();
  const f=$('.sb-foot');if(!f)return;
  f.innerHTML=`RKB 2025/2026 · Pejabat RKB<br><span class="mono" id="sbVer">${APP_VER}</span>`;};

/* ── AUTO-INIT: muatkan data dari cloud sebelum login ─────────────────
   Sesiapa yang buka URL (Netlify) akan terus dapat data terkini dari
   Supabase tanpa perlu konfigurasi apa-apa. Config di-embed dalam HTML.
   ──────────────────────────────────────────────────────────────────── */
(async function initApp(){
  // 1. Cuba muat dari cloud (jika config ada dalam HTML)
  const cfg=getCloudCfg();
  if(cfg&&cfg.url&&cfg.key){
    const loader=document.createElement('div');
    loader.id='initLoader';
    loader.style.cssText='position:fixed;inset:0;background:rgba(255,255,255,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px';
    loader.innerHTML='<div style="font-size:2.5rem">☁</div><div style="font-size:1rem;color:#1A5FAD;font-weight:700">Menyambung ke cloud…</div><div style="font-size:.82rem;color:#888">Memuatkan data terkini dari Supabase</div>';
    document.body.appendChild(loader);
    const row=await pullFromCloud();
    if(row&&row.data){ state=row.data; mergeDefaults(); saveState(); }
    else { loadState(); }
    loader.remove();
  } else { loadState(); }
  computeRanks();
  initLogin();
})();

</script>
